  progress at theme, epic, and story level and is intended to mirror
  THEMES_EPICS_STORIES.md more closely than the older curated subset.

progress_snapshot:
  assessed_branch: main
  assessed_commit: "ccfd969"
  interpretation_date: "2026-03-26"
  assessed_state_note: "Snapshot reflects current main, not older PR audit state."
  theme_status:
    T1:
      status: in_progress
      approx_progress: 45
    T2:
      status: mostly_complete
