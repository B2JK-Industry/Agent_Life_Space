            status: complete_for_phase
            current_state: Implemented.
            missing: None for Reviewer v1.
          - id: T2-E2-S2
            name: Standardize severity, file references, and recommended fixes
            status: complete_for_phase
            current_state: Implemented in review model and Markdown export.
            missing: None for Reviewer v1.
          - id: T2-E2-S3
            name: Add explicit assumptions, open questions, and low-confidence language
            status: mostly_complete
            current_state: Assumptions, open questions, and confidence exist.
            missing: Stronger low-confidence policy language in more review paths.
          - id: T2-E2-S4
            name: Export reports to Markdown and JSON
            status: complete_for_phase
            current_state: Implemented.
            missing: None for Reviewer v1.

      - id: T2-E3
        name: Review Verification
        status: mostly_complete
        approx_progress: 75
        remaining_gap: Verifier exists, but no golden-eval-backed quality regime yet.
        stories:
          - id: T2-E3-S1
            name: Add verifier pass for review output
            status: complete_for_phase
            current_state: Implemented.
            missing: None for Reviewer v1.
          - id: T2-E3-S2
            name: Add false-positive reduction strategy
            status: mostly_complete
            current_state: Verifier reduces weak findings.
            missing: Benchmarked precision and recall discipline.
          - id: T2-E3-S3
            name: Add consistency checks for severity and evidence
            status: mostly_complete
            current_state: Some consistency filtering exists.
            missing: Stronger severity calibration and evals.
          - id: T2-E3-S4
