themes:
  - id: T1
    name: Platform Foundation
    goal: Unify the core job, state, artifact, and execution foundation.
    status: in_progress
    approx_progress: 45
    current_state: ReviewJob, artifact storage, workspace subsystem, and execution trace exist.
    main_gap: No canonical cross-system job model exists yet.
    epics:
      - id: T1-E1
        name: Canonical Job Model
        status: in_progress
        approx_progress: 30
        remaining_gap: ReviewJob is strong locally, but JobRunner, Task, and AgentLoop still coexist without convergence.
        stories:
          - id: T1-E1-S1
            name: Define canonical Job schema for review, build, operate, and delivery flows
            status: started
            current_state: ReviewJob exists for reviewer only.
            missing: System-wide shared Job schema.
          - id: T1-E1-S2
            name: Add Job lifecycle states and recovery rules
            status: started
            current_state: Reviewer lifecycle exists and reload works.
            missing: One lifecycle model across review, build, operate, and delivery.
          - id: T1-E1-S3
            name: Persist job metadata, execution history, artifacts, and cost data
            status: started
            current_state: Reviewer jobs persist metadata, report, and traces.
            missing: Unified cost and execution persistence across all job types.
          - id: T1-E1-S4
            name: Add job queries for operator inspection and automation
            status: not_started
            current_state: Ad-hoc listing exists only inside reviewer storage.
            missing: Cross-job query layer and operator inspection surface.
          - id: T1-E1-S5
            name: Reconcile coexistence rules between ReviewJob, JobRunner, Task, and AgentLoop
            status: started
            current_state: Coexistence is visible and documented.
            missing: Explicit convergence rules or phased deprecation plan.

      - id: T1-E2
        name: Artifact-First Execution
        status: mostly_complete
        approx_progress: 70
        remaining_gap: Artifact persistence is strong, but artifact hydration is not yet the single source of truth.
        stories:
          - id: T1-E2-S1
            name: Define artifact types and storage layout
            status: mostly_complete
            current_state: Reviewer artifact types and SQLite storage exist.
            missing: Broader artifact taxonomy beyond reviewer flow.
          - id: T1-E2-S2
            name: Link artifacts to jobs and execution traces
            status: mostly_complete
            current_state: Reviewer artifacts link to job id and trace export.
            missing: Shared artifact model across future build and operator flows.
          - id: T1-E2-S3
            name: Add export support for Markdown, JSON, and delivery bundles
            status: complete_for_phase
            current_state: Reviewer exports Markdown, JSON, findings, and delivery bundle.
            missing: None for Reviewer v1.
          - id: T1-E2-S4
            name: Add artifact retention and recovery rules
            status: started
            current_state: Basic cleanup exists.
            missing: Explicit retention policy, export policy, and replay policy.
          - id: T1-E2-S5
            name: Persist full intake, report payloads, and artifact payloads for recovery-safe reload
            status: mostly_complete
            current_state: Intake and report payloads persist; artifact payloads are retrievable.
            missing: Fully hydrated artifact graph on ReviewJob reload.

      - id: T1-E3
        name: Workspace And Execution Discipline
        status: in_progress
        approx_progress: 40
        remaining_gap: Reviewer execution mode is explicit, but not fully truthful.
        stories:
          - id: T1-E3-S1
            name: Ensure all mutable engineering work happens in isolated workspaces
            status: started
            current_state: Workspace subsystem exists.
            missing: Builder execution is not using it yet.
          - id: T1-E3-S2
            name: Make workspace lifecycle, audit, and recovery robust
            status: mostly_complete
            current_state: Workspace persistence and recovery tests exist.
            missing: Stronger linkage into all work modes.
          - id: T1-E3-S3
            name: Link workspace records to jobs, artifacts, and approvals
            status: started
            current_state: Reviewer records workspace_id.
            missing: Consistent job/workspace/artifact/approval linkage.
          - id: T1-E3-S4
            name: Add environment profiles for safe execution modes
            status: started
            current_state: Sandbox and project-root discipline exist.
            missing: Explicit profile matrix for local, operator, and enterprise modes.
          - id: T1-E3-S5
            name: Bind reviewer jobs to workspace discipline or define explicit read-only review execution mode
            status: in_progress
            current_state: ExecutionMode exists.
            missing: WORKSPACE_BOUND review is still not fully truthful because analyzers use host repo paths.

