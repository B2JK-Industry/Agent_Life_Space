next_execution_backlog:
  - priority: P0
    story_id: T1-E2-S4
    title: "Add artifact retention and recovery rules"
    why_now: "Plan, trace, patch, diff, report, and delivery-oriented artifacts are now durable and queryable, but retention and pruning rules are still undefined."
  - priority: P0
    story_id: T5-E1-S1
    title: "Extend policy model to job, artifact, delivery, and external gateway decisions"
    why_now: "Builder now has deterministic review-gate and delivery policy profiles, but policy is still fragmented and does not yet govern all control-plane decisions uniformly."
  - priority: P0
    story_id: T1-E1-S3
    title: "Persist job metadata, execution history, artifacts, and cost data"
    why_now: "Plans, traces, and delivery records now have shared persistence, but product job metadata and cost history are still split across bounded contexts."
  - priority: P1
    story_id: T6-E1-S1
    title: "Record per-job model usage and token cost"
    why_now: "Stronger control-plane persistence now gives usage/cost data a meaningful place to land instead of remaining only a local field shell."
  - priority: P1
    story_id: T2-E4-S5
    title: "Route Telegram and API review entrypoints through ReviewService"
    why_now: "The product/control-plane slices are converging, but channel adapters can still drift away from the clean reviewer bounded context."
  - priority: P1
    story_id: T5-E1-S5
    title: "Bring repository and diff analysis under the shared execution and policy boundary"
    why_now: "Review/build policy has improved, but review-side repo/diff access still sits outside the unified execution-policy model."
  - priority: P1
    story_id: T4-E1-S4
    title: "Reject unsupported work cleanly and honestly"
    why_now: "git_url is honestly blocked, but intake still cannot acquire or import supported remote work."
  - priority: P2
    story_id: T6-E1-S2
    title: "Add hard budget, soft budget, and stop-loss behavior"
    why_now: "Planning already emits budget envelopes, so the next gap is binding them to durable runtime controls rather than leaving them advisory."
themes:
  - id: T1
    name: Platform Foundation
    goal: Unify job, artifact, state, and workspace foundations.
    status: in_progress
    approx_progress: 89
    current_state: Shared control-plane primitives now back build and review directly, with explicit runtime coexistence rules plus shared build/review/operate job queries, shared artifact queries, persisted plan/trace/delivery records, and richer workspace-aware approval/reporting surfaces.
    main_gap: No unified cross-domain persistence/action layer yet.
    epics:
      - id: T1-E1
        name: Canonical Job Model
        status: in_progress
        approx_progress: 88
        remaining_gap: Shared primitives and shared query models now span build/review/operate/artifact surfaces, but product-job persistence/action convergence is still incomplete.
        stories:
          - id: T1-E1-S1
            name: Define canonical Job schema for review, build, operate, and delivery flows
            status: complete_for_phase
            current_state: Shared JobKind, JobStatus, JobTiming, ExecutionStep, ArtifactKind, ArtifactRef, and UsageSummary now back both BuildJob and ReviewJob directly.
            missing: Delivery/operate convergence rules remain separate scope.
          - id: T1-E1-S2
            name: Add Job lifecycle states and recovery rules
            status: complete_for_phase
            current_state: Shared JobStatus and JobTiming now govern both build and review lifecycle/recovery state.
            missing: Operate/delivery lifecycle harmonization remains.
          - id: T1-E1-S3
            name: Persist job metadata, execution history, artifacts, and cost data
            status: in_progress
            current_state: BuildStorage persists job metadata, execution history, artifacts, and usage summary. Review artifacts recover metadata safely.
            missing: No unified cross-system persistence layer yet.
          - id: T1-E1-S4
            name: Add job queries for operator inspection and automation
            status: complete_for_phase
            current_state: JobQuerySummary/JobQueryDetail and JobQueryService now normalize build, review, task, job-runner, and agent-loop records behind one shared list/get surface. AgentOrchestrator exposes that surface directly.
            missing: Query actions remain read-only; planning/automation layers remain separate scope.
          - id: T1-E1-S5
            name: Reconcile coexistence rules between ReviewJob, JobRunner, Task, and AgentLoop
            status: complete_for_phase
            current_state: RuntimeModelService now makes the coexistence rules explicit: BuildJob/ReviewJob are canonical product jobs, Task remains planning state, JobRunner remains infrastructure execution, and AgentLoop remains an ephemeral conversational queue.
            missing: Rules are explicit, but not yet enforced through stronger invariants or migrations.

      - id: T1-E2
        name: Artifact-First Execution
        status: mostly_complete
        approx_progress: 90
        remaining_gap: Typed artifacts exist across review and build, one shared artifact query/recovery surface spans both bounded contexts, and builder now exports deterministic patch/diff artifacts, but retention/policy remains open.
        stories:
          - id: T1-E2-S1
            name: Define artifact types and storage layout
            status: mostly_complete
          - id: T1-E2-S2
            name: Link artifacts to jobs and execution traces
            status: mostly_complete
          - id: T1-E2-S3
            name: Add export support for Markdown, JSON, and delivery bundles
            status: complete_for_phase
          - id: T1-E2-S4
            name: Add artifact retention and recovery rules
            status: started
          - id: T1-E2-S5
            name: Persist full intake, report payloads, and artifact payloads for recovery-safe reload
            status: complete_for_phase
            current_state: ArtifactQueryService now exposes shared build/review artifact list/get recovery, and build/review storage both persist artifact format alongside content/content_json payloads.
            missing: Artifact retention policy and richer builder patch export remain open.

      - id: T1-E3
        name: Workspace And Execution Discipline
        status: in_progress
        approx_progress: 82
        remaining_gap: Builder is workspace-first and reviewer is explicitly READ_ONLY_HOST; shared workspace linkage now exists, but cross-domain workspace policy is still partial.
        stories:
          - id: T1-E3-S1
            name: Ensure all mutable engineering work happens in isolated workspaces
            status: in_progress
            current_state: Builder requires a workspace manager, defaults to WORKSPACE_BOUND, and now syncs repos into managed workspaces before verification.
            missing: Reviewer v1 is still read-only and there is no shared mutable execution model yet.
          - id: T1-E3-S2
            name: Make workspace lifecycle, audit, and recovery robust
            status: mostly_complete
          - id: T1-E3-S3
            name: Link workspace records to jobs, artifacts, and approvals
            status: complete_for_phase
            current_state: WorkspaceQueryService now exposes workspace records as shared control-plane joins over jobs, artifacts, approvals, and delivery bundles, and those records flow through the orchestrator, CLI, and operator report.
            missing: Reviewer still runs in READ_ONLY_HOST, so cross-domain workspace policy is not fully unified yet.
          - id: T1-E3-S4
            name: Add environment profiles for safe execution modes
            status: started
          - id: T1-E3-S5
            name: Bind reviewer jobs to workspace discipline or define explicit read-only review execution mode
            status: complete_for_phase
            current_state: ExecutionMode always READ_ONLY_HOST in v1. _get_analysis_path() is single source of truth.
            missing: WORKSPACE_BOUND requires analyzers to read from workspace path (v2 scope).

  - id: T2
    name: Reviewer Product
    goal: Make review a first-class client-ready workflow.
    status: complete_for_phase
    approx_progress: 85
    current_state: Reviewer bounded context, verifier, strict delivery gating, full client-safe redaction, honest execution mode.
    main_gap: LLM analysis, API entrypoint, PR comment packs are v2 scope.
    epics:
      - id: T2-E1
        name: Review Job Types
        status: mostly_complete
        approx_progress: 80
        stories:
          - id: T2-E1-S1
            name: Implement repo audit job type
            status: complete_for_phase
          - id: T2-E1-S2
            name: Implement PR review job type
            status: in_progress
          - id: T2-E1-S3
            name: Implement release readiness review job type
            status: mostly_complete
          - id: T2-E1-S4
            name: Add shared review job interface and input validation
            status: mostly_complete
      - id: T2-E2
        name: Review Output Standardization
        status: complete_for_phase
        approx_progress: 90
        stories:
          - id: T2-E2-S1
            name: Define canonical report structure
            status: complete_for_phase
          - id: T2-E2-S2
            name: Standardize severity, file references, and recommended fixes
            status: complete_for_phase
          - id: T2-E2-S3
            name: Add explicit assumptions, open questions, and low-confidence language
            status: mostly_complete
          - id: T2-E2-S4
            name: Export reports to Markdown and JSON
            status: complete_for_phase
      - id: T2-E3
        name: Review Verification
        status: mostly_complete
        approx_progress: 75
        stories:
          - id: T2-E3-S1
            name: Add verifier pass for review output
            status: complete_for_phase
          - id: T2-E3-S2
            name: Add false-positive reduction strategy
            status: mostly_complete
          - id: T2-E3-S3
            name: Add consistency checks for severity and evidence
            status: mostly_complete
          - id: T2-E3-S4
            name: Record review confidence and verification result
            status: mostly_complete
      - id: T2-E4
        name: Review Delivery
        status: mostly_complete
        approx_progress: 80
        stories:
          - id: T2-E4-S1
            name: Prepare copy-paste-ready PR comments
            status: not_started
          - id: T2-E4-S2
            name: Add delivery approval before external send
            status: complete_for_phase
            current_state: Strict approval gating. delivery_ready=False by default. Blocked without queue.
            missing: External send workflow (Operator scope).
          - id: T2-E4-S3
            name: Add client-safe output mode with redaction
            status: complete_for_phase
            current_state: Full redaction pipeline on all text fields. Strips requester, source, execution_mode, trace.
            missing: Wider system outputs beyond reviewer.
          - id: T2-E4-S4
            name: Add report packaging for operator handoff
            status: mostly_complete
          - id: T2-E4-S5
            name: Route Telegram and API review entrypoints through ReviewService
            status: in_progress
            current_state: Telegram /review routes through ReviewService.
            missing: API review entrypoint.

  - id: T3
    name: Builder Product
    goal: Make implementation controlled, testable, and acceptance-driven.
    status: in_progress
    approx_progress: 80
    current_state: Builder bounded context with models, service, storage, repo-aware verification discovery, acceptance criteria engine, workspace sync, capability catalog, resumable checkpoints, orchestrator runtime entrypoint, CLI entrypoint, policy-driven post-build review gate, and deterministic patch/diff plus delivery-lifecycle output.
    main_gap: No LLM implementation, no real code generation, and no external delivery send path yet.
    epics:
      - id: T3-E1
        name: Capability-Based Build Execution
        status: in_progress
        approx_progress: 84
        remaining_gap: Build flow exists, has real runtime entrypoints, declared capabilities, resumable checkpoints, and delivery-package preview artifacts, but the build step is still placeholder-grade.
        stories:
          - id: T3-E1-S1
            name: Define implementation capability catalog
            status: complete_for_phase
            current_state: agent/build/capabilities.py now declares explicit implementation, integration, devops, and testing capabilities with verification defaults, target patterns, resume support, and review-after-build defaults.
            missing: External provider routing remains future scope.
          - id: T3-E1-S2
            name: Expose builder through a real product entrypoint
            status: mostly_complete
            current_state: AgentOrchestrator now exposes run_build_job(), and python -m agent --build-repo ... routes builder work through the shared runtime.
            missing: No operator/chat/API entrypoint yet, and capability routing remains separate scope.
          - id: T3-E1-S3
            name: Capture patch sets, diffs, and execution traces as artifacts
            status: complete_for_phase
            current_state: Builder now captures deterministic patch + diff artifacts by comparing source repo and workspace, alongside verification, acceptance, review, finding-list, and trace artifacts persisted via BuildStorage.
            missing: Patch export is honest but still reflects placeholder execution when no implementation engine changes files.
          - id: T3-E1-S4
            name: Make execution resumable after interruption
            status: mostly_complete
            current_state: BuildJob now records checkpoints, resume lineage, and can resume through BuildService.resume_build() and python -m agent --build-resume ..., reusing successful phases and rerunning failed ones.
            missing: No planner-driven or distributed-worker resume policy yet.
      - id: T3-E2
        name: Build Verification Loop
        status: in_progress
        approx_progress: 84
        stories:
          - id: T3-E2-S1
            name: Add test, lint, and type-check loop for implementation jobs
            status: mostly_complete
            current_state: Builder now performs repo-aware verification discovery for test, lint, and typecheck surfaces, then runs the discovered suite in the workspace. Custom commands remain available underneath the verification layer.
            missing: Discovery is still heuristic and not yet a language-specific execution planner.
          - id: T3-E2-S2
            name: Add review-after-build pass before completion
            status: mostly_complete
            current_state: Successful build jobs can now request a deterministic post-build review pass through ReviewService, persist review artifacts, feed review signals into acceptance + delivery output, and gate completion through explicit review_gate_policy_id profiles.
            missing: Reviewer still operates in READ_ONLY_HOST mode over the built workspace path, and policy is not yet unified with the wider execution boundary.
          - id: T3-E2-S3
            name: Fail jobs clearly when acceptance criteria are not met
            status: in_progress
            current_state: BuildService fails jobs when acceptance criteria are unmet.
            missing: Acceptance evaluation is still rule-based and limited.
          - id: T3-E2-S4
            name: Capture all verification artifacts and verdicts
            status: in_progress
            current_state: Verification results persist as first-class build artifacts.
      - id: T3-E3
        name: Acceptance Criteria Engine
        status: in_progress
        approx_progress: 70
        stories:
          - id: T3-E3-S1
            name: Define acceptance criteria object model
            status: in_progress
            current_state: AcceptanceCriterion supports typed criterion kinds and statuses with meet, fail, and skip transitions.
            missing: No semantic evaluation beyond rule-based checks yet.
          - id: T3-E3-S2
            name: Attach acceptance criteria to jobs
            status: in_progress
            current_state: BuildIntake carries acceptance_criteria and BuildJob inherits them.
            missing: Criteria are attached and checked, but richer requirement matching is still missing.
          - id: T3-E3-S3
            name: Validate criteria at completion time
            status: mostly_complete
            current_state: AcceptanceVerdict.evaluate() runs at completion with keyword-bound verification checks, explicit verify commands, review-backed security checks, and change-set-aware docs/target-file evaluators.
            missing: No richer semantic engine beyond deterministic rule-based evaluators yet.
          - id: T3-E3-S4
            name: Produce acceptance reports for delivery
            status: in_progress
            current_state: Acceptance reports are emitted as build artifacts.
            missing: Delivery packaging is still basic.

  - id: T4
    name: Operator Product
    goal: Coordinate end-to-end work and delivery.
    status: in_progress
    approx_progress: 76
    current_state: Unified intake routing, phase-aware JobPlan preview/submit output, persisted planner handoff records, planning traces, delivery lifecycle state, workspace joins, richer operator report service, and shared builder delivery package preview exist alongside CI typecheck.
    main_gap: No live backend/UI, no review delivery migration onto the shared lifecycle, and no remote acquisition path.
    epics:
      - id: T4-E1
        name: Intake And Qualification
        status: in_progress
        approx_progress: 70
        stories:
          - id: T4-E1-S1
            name: Create intake model for repo paths, git URLs, diff ranges, and work type
            status: complete_for_phase
            current_state: agent/control/intake.py now defines a unified operator intake envelope for repo paths, git URLs, diff ranges, work type, build type, acceptance criteria, and routing metadata.
            missing: Git URL execution still requires clone support before it becomes runnable.
          - id: T4-E1-S2
            name: Add qualification logic for scope, risk, and budget
            status: mostly_complete
            current_state: OperatorIntakeService.qualify() plus JobPlan creation now resolve scope size, scope signals, risk factors, and a policy-backed budget envelope using BudgetPolicy plus live finance budget state when available.
            missing: Cost estimates are still deterministic heuristics, and there is no live operator UI.
          - id: T4-E1-S3
            name: Add operator-facing intake summary and recommended plan
            status: complete_for_phase
            current_state: python -m agent --intake-* --intake-preview now returns qualification plus a structured JobPlan, and preview/submit both persist a first-class plan record for later operator handoff through orchestrator and CLI list/get surfaces.
            missing: No live operator UI yet.
          - id: T4-E1-S4
            name: Reject unsupported work cleanly and honestly
            status: in_progress
            current_state: Unsupported git-only intake is now modeled and explicitly rejected with blockers rather than being silently routed.
            missing: No alternative acquisition path (clone/import) yet.
      - id: T4-E2
        name: Job Planning And Routing
        status: in_progress
        approx_progress: 82
        stories:
          - id: T4-E2-S1
            name: Create JobPlan model and planner outputs
            status: complete_for_phase
            current_state: JobPlan, JobPlanStep, JobPlanPhase, JobPlanCapability, and JobPlanBudgetEnvelope now exist in agent/control/intake.py, and planner output is surfaced through preview/submit flows plus persisted JobPlanRecord handoff state.
            missing: Planner output is durable, but not yet a distributed execution history.
          - id: T4-E2-S2
            name: Split work into review, build, verify, deliver phases
            status: complete_for_phase
            current_state: Planner output now exposes explicit qualify, review, build, verify, and deliver phases, with phase-aware steps for both review and build routes.
            missing: Planner phases are still preview/submit constructs rather than persisted execution history.
          - id: T4-E2-S3
            name: Assign capabilities and budget envelopes
            status: mostly_complete
            current_state: Planner output now assigns concrete build catalog capabilities plus planner profiles for review, verify, and deliver phases, alongside structured budget envelope metadata.
            missing: Only the build phase currently binds to a runtime capability catalog; the remaining phase assignments are planner profiles.
          - id: T4-E2-S4
            name: Record execution traces for planning decisions
            status: complete_for_phase
            current_state: Qualification, budget, capability, and delivery decisions now emit durable ExecutionTraceRecord entries that can be listed and filtered through the shared control-plane surface.
            missing: Trace coverage is still strongest for planning/build delivery, not yet the whole runtime.
      - id: T4-E3
        name: Delivery Workflow
        status: in_progress
        approx_progress: 72
        stories:
          - id: T4-E3-S1
            name: Define delivery package model
            status: complete_for_phase
            current_state: Shared DeliveryPackage model now exists in agent/control/models.py and is used by builder delivery preview.
            missing: Review delivery has not yet been migrated onto the shared model.
          - id: T4-E3-S2
            name: Assemble artifacts, reports, and acceptance results into delivery bundles
            status: mostly_complete
            current_state: Builder now assembles verification, acceptance, patch, diff, review, findings, and workspace metadata into a delivery package preview, while reviewer keeps its delivery bundle path.
            missing: Delivery bundles are still split across build/review implementations rather than one unified control-plane service.
          - id: T4-E3-S3
            name: Gate delivery through approvals
            status: mostly_complete
            current_state: Review delivery approval already existed, and builder delivery now requests approval with explicit job, artifact, workspace, and bundle linkage while refreshing lifecycle status after approval changes.
            missing: Review delivery still uses a separate lifecycle implementation.
          - id: T4-E3-S4
            name: Record delivery status and handoff audit events
            status: mostly_complete
            current_state: Builder delivery now persists lifecycle state (prepared, awaiting_approval, approved, rejected, handed_off) plus explicit audit events surfaced through the orchestrator, CLI, workspace joins, and operator report.
            missing: Shared lifecycle still covers builder delivery more fully than reviewer delivery.

  - id: T5
    name: Security, Governance, And Policy
    goal: Ensure all valuable workflows remain controlled and auditable.
    status: in_progress
    approx_progress: 69
    current_state: Tool policy deny-by-default, strict delivery approval, full redaction pipeline, persistent/queryable approvals with job/artifact/workspace/bundle linkage, plus deterministic review-gate and delivery policy profiles.
    main_gap: Review and build execution still sit outside a unified shared policy boundary.
    epics:
      - id: T5-E1
        name: Policy Control Plane
        status: in_progress
        approx_progress: 58
        stories:
          - id: T5-E1-S1
            name: Extend policy model to job, artifact, delivery, and gateway decisions
            status: in_progress
            current_state: Builder now uses deterministic review-gate and delivery policy profiles that are surfaced in planning metadata, traces, and delivery approval context.
            missing: Job/artifact/gateway policy is still not unified under one shared engine.
          - id: T5-E1-S2
            name: Keep policy deny-by-default across execution modes
            status: in_progress
          - id: T5-E1-S3
            name: Add structured denial reasons everywhere
            status: started
          - id: T5-E1-S4
            name: Ensure policy is deterministic and separately testable
            status: mostly_complete
          - id: T5-E1-S5
            name: Bring repository and diff analysis under shared execution and policy boundary
            status: started
      - id: T5-E2
        name: Approval Model
        status: in_progress
        approx_progress: 80
        stories:
          - id: T5-E2-S1
            name: Make approval requests persistent and queryable
            status: complete_for_phase
            current_state: ApprovalStorage persists approval lifecycle state, ApprovalQueue recovers it, and approvals can now be queried by status/category/job/artifact/workspace/bundle linkage.
            missing: Shared delivery/workspace policy queries remain separate scope.
          - id: T5-E2-S2
            name: Support approvals for risky execution and external delivery
            status: in_progress
          - id: T5-E2-S3
            name: Support multi-step approvals where needed
            status: not_started
          - id: T5-E2-S4
            name: Link approvals to jobs, artifacts, and delivery bundles
            status: mostly_complete
            current_state: Review delivery approvals already carried job_id, job_kind, and artifact_ids; builder delivery approvals now add workspace_id and bundle_id, and approval queries can filter on all of those linked records.
            missing: Broader policy/action unification and multi-step execution workflows remain future scope.
      - id: T5-E3
        name: Client-Safe And Secret-Safe Output
        status: mostly_complete
        approx_progress: 70
        remaining_gap: Redaction covers all reviewer text fields, but not yet system-wide.
        stories:
          - id: T5-E3-S1
            name: Enforce redaction on reports and logs
            status: started
          - id: T5-E3-S2
            name: Prevent sensitive internal data in client output
            status: complete_for_phase
            current_state: requester, source, execution_mode, trace stripped. All text fields through full redaction.
          - id: T5-E3-S3
            name: Add client-safe review mode
            status: complete_for_phase
            current_state: Client-safe bundle with full pipeline. Error field redacted.
          - id: T5-E3-S4
            name: Add security regression tests around redaction and delivery
            status: started

  - id: T6
    name: Cost, Usage, And Observability
    goal: Make the system operable, measurable, and economically sane.
    status: in_progress
    approx_progress: 64
    current_state: UsageSummary in control-plane. Fields on review and build jobs. Orchestrator-visible build/review counters, durable planning/delivery traces, shared cross-system job/artifact/workspace queries, approval backlog visibility, and operator-facing reporting now include workspace health and worker execution summaries.
