            missing: More explicit verification result artifact.

      - id: T2-E4
        name: Review Delivery
        status: in_progress
        approx_progress: 70
        remaining_gap: Delivery foundations exist, but API path, PR comment packs, and harder delivery governance are still open.
        stories:
          - id: T2-E4-S1
            name: Prepare copy-paste-ready PR comments and summary review artifacts
            status: not_started
            current_state: No dedicated PR comment pack artifact.
            missing: PR-comment-ready delivery format.
          - id: T2-E4-S2
            name: Add delivery approval before external send
            status: in_progress
            current_state: Approval request hook exists.
            missing: No-bypass production-safe enforcement and external send workflow.
          - id: T2-E4-S3
            name: Add client-safe output mode with redaction
            status: mostly_complete
            current_state: Client-safe bundle exists.
            missing: Stronger redaction policy and metadata minimization.
          - id: T2-E4-S4
