themes:
  - id: T1
    name: Platform Foundation
    goal: Unify job, artifact, state, and workspace foundations.
    status: in_progress
    approx_progress: 50
    current_state: ReviewJob with recovery, artifact metadata hydration, workspace subsystem, _get_analysis_path().
    main_gap: No canonical cross-system job model yet.
    epics:
      - id: T1-E1
        name: Canonical Job Model
        status: in_progress
        approx_progress: 30
        remaining_gap: ReviewJob is strong locally, but JobRunner, Task, AgentLoop coexist without convergence.
        stories:
          - id: T1-E1-S1
            name: Define canonical Job schema for review, build, operate, and delivery flows
            status: started
            current_state: ReviewJob exists for reviewer only.
            missing: System-wide shared Job schema.
          - id: T1-E1-S2
            name: Add Job lifecycle states and recovery rules
            status: started
            current_state: Reviewer lifecycle exists and reload works.
            missing: One lifecycle model across all job types.
          - id: T1-E1-S3
            name: Persist job metadata, execution history, artifacts, and cost data
            status: started
            current_state: Reviewer jobs persist metadata, report, and traces.
            missing: Unified persistence across all job types.
          - id: T1-E1-S4
            name: Add job queries for operator inspection and automation
            status: not_started
          - id: T1-E1-S5
            name: Reconcile coexistence rules between ReviewJob, JobRunner, Task, and AgentLoop
            status: started
            current_state: Coexistence is visible and documented.
            missing: Explicit convergence rules or phased deprecation plan.

      - id: T1-E2
        name: Artifact-First Execution
        status: mostly_complete
        approx_progress: 75
        remaining_gap: Artifact metadata hydrates via from_dict(), but content loads separately via storage. Not shared across domains.
        stories:
          - id: T1-E2-S1
            name: Define artifact types and storage layout
            status: mostly_complete
          - id: T1-E2-S2
            name: Link artifacts to jobs and execution traces
            status: mostly_complete
          - id: T1-E2-S3
            name: Add export support for Markdown, JSON, and delivery bundles
            status: complete_for_phase
          - id: T1-E2-S4
            name: Add artifact retention and recovery rules
            status: started
          - id: T1-E2-S5
            name: Persist full intake, report payloads, and artifact payloads for recovery-safe reload
            status: mostly_complete
            current_state: ReviewArtifact.from_dict() hydrates metadata. Full content via storage.get_artifacts().
            missing: Artifact content not inline in ReviewJob.

      - id: T1-E3
        name: Workspace And Execution Discipline
        status: in_progress
        approx_progress: 45
        remaining_gap: Execution mode is honest (always READ_ONLY_HOST in v1). WORKSPACE_BOUND deferred to v2.
        stories:
          - id: T1-E3-S1
            name: Ensure all mutable engineering work happens in isolated workspaces
            status: started
            missing: Builder execution not using workspaces yet.
          - id: T1-E3-S2
            name: Make workspace lifecycle, audit, and recovery robust
            status: mostly_complete
          - id: T1-E3-S3
            name: Link workspace records to jobs, artifacts, and approvals
            status: started
          - id: T1-E3-S4
            name: Add environment profiles for safe execution modes
            status: started
          - id: T1-E3-S5
            name: Bind reviewer jobs to workspace discipline or define explicit read-only review execution mode
            status: complete_for_phase
            current_state: ExecutionMode always READ_ONLY_HOST in v1. _get_analysis_path() is single source of truth.
            missing: WORKSPACE_BOUND requires analyzers to read from workspace path (v2 scope).

  - id: T2
    name: Reviewer Product
    goal: Make review a first-class client-ready workflow.
    status: complete_for_phase
    approx_progress: 85
    current_state: Reviewer bounded context, verifier, strict delivery gating, full client-safe redaction, honest execution mode.
    main_gap: LLM analysis, API entrypoint, PR comment packs are v2 scope.
    epics:
      - id: T2-E1
        name: Review Job Types
        status: mostly_complete
        approx_progress: 80
        stories:
          - id: T2-E1-S1
            name: Implement repo audit job type
            status: complete_for_phase
          - id: T2-E1-S2
            name: Implement PR review job type
            status: in_progress
          - id: T2-E1-S3
            name: Implement release readiness review job type
            status: mostly_complete
          - id: T2-E1-S4
            name: Add shared review job interface and input validation
            status: mostly_complete
      - id: T2-E2
        name: Review Output Standardization
        status: complete_for_phase
        approx_progress: 90
        stories:
          - id: T2-E2-S1
            name: Define canonical report structure
            status: complete_for_phase
          - id: T2-E2-S2
            name: Standardize severity, file references, and recommended fixes
            status: complete_for_phase
          - id: T2-E2-S3
            name: Add explicit assumptions, open questions, and low-confidence language
            status: mostly_complete
          - id: T2-E2-S4
            name: Export reports to Markdown and JSON
            status: complete_for_phase
      - id: T2-E3
        name: Review Verification
        status: mostly_complete
        approx_progress: 75
        stories:
          - id: T2-E3-S1
            name: Add verifier pass for review output
            status: complete_for_phase
          - id: T2-E3-S2
            name: Add false-positive reduction strategy
            status: mostly_complete
          - id: T2-E3-S3
            name: Add consistency checks for severity and evidence
            status: mostly_complete
          - id: T2-E3-S4
            name: Record review confidence and verification result
            status: mostly_complete
      - id: T2-E4
        name: Review Delivery
        status: mostly_complete
        approx_progress: 80
        stories:
          - id: T2-E4-S1
            name: Prepare copy-paste-ready PR comments
            status: not_started
          - id: T2-E4-S2
            name: Add delivery approval before external send
            status: complete_for_phase
            current_state: Strict approval gating. delivery_ready=False by default. Blocked without queue.
            missing: External send workflow (Operator scope).
          - id: T2-E4-S3
            name: Add client-safe output mode with redaction
            status: complete_for_phase
            current_state: Full redaction pipeline on all text fields. Strips requester, source, execution_mode, trace.
            missing: Wider system outputs beyond reviewer.
          - id: T2-E4-S4
            name: Add report packaging for operator handoff
            status: mostly_complete
          - id: T2-E4-S5
            name: Route Telegram and API review entrypoints through ReviewService
            status: in_progress
            current_state: Telegram /review routes through ReviewService.
            missing: API review entrypoint.

