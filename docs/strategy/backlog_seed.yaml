  - id: T6
    name: Cost, Usage, And Observability
    goal: Make the system operable, measurable, and economically sane.
    status: in_progress
    approx_progress: 99
    current_state: UsageSummary now lands in a durable per-job control-plane cost ledger for build and review jobs. Orchestrator-visible build/review counters, persisted product jobs, retained artifacts, durable planning/delivery/gateway/release traces, shared cross-system job/artifact/workspace queries, approval backlog visibility with blocked reasons, runtime budget enforcement, budget-aware escalation controls, operator-facing reporting, review-eval smoke checks, golden review cases in CI, release-readiness gating in CLI and CI, and runtime review-quality telemetry now cover workspace health, worker execution, recorded-cost summaries, product-job telemetry, budget posture, retention posture, latest provider outcomes, and regression-vs-baseline trend posture.
    main_gap: No live operator UI or broader longitudinal dashboards yet.
    epics:
      - id: T6-E1
        name: Cost Ledger
        status: in_progress
        approx_progress: 84
        stories:
          - id: T6-E1-S1
            name: Record per-job model usage and token cost
            status: mostly_complete
            current_state: Build and review jobs now persist per-job usage, token, and cost data into the shared control-plane ledger, and the orchestrator, CLI, and operator report expose recent ledger entries plus total recorded cost.
            missing: Budgets, escalation controls, and operator margin hints still sit outside the ledger.
          - id: T6-E1-S2
            name: Add hard budget, soft budget, and stop-loss behavior
            status: complete_for_phase
            current_state: BudgetPolicy now drives hard-cap, soft-cap, stop-loss, and approval-cap decisions, unified intake enforces those decisions at runtime, and blocked budget decisions now emit explicit control-plane traces.
            missing: Budget-aware escalation remains separate scope.
          - id: T6-E1-S3
            name: Make escalation budget-aware
            status: mostly_complete
            current_state: Brain-side learning overrides and post-routing quality escalation now check runtime budget posture before escalating models, and blocked escalation decisions stay inside the deterministic finance policy envelope.
            missing: Escalation still uses simple fixed-cost assumptions and has no live operator override UI.
          - id: T6-E1-S4
            name: Surface cost and margin hints to the operator
            status: complete_for_phase
            current_state: Finance budget state now exposes warnings, hard/soft/stop-loss posture, single-transaction approval cap, and persisted product-job attention signals through the operator report and CLI.
            missing: There is still no live operator UI.
      - id: T6-E2
        name: Runtime Observability
        status: in_progress
        approx_progress: 89
        stories:
          - id: T6-E2-S1
            name: Track job status, failures, retries, and durations
            status: mostly_complete
            current_state: Persisted ProductJobRecord entries now track duration, retry count, and failure count, and the operator report summarizes failed jobs, retried jobs, and max observed duration across persisted product jobs.
            missing: Telemetry is strongest for persisted build/review jobs; deeper operate-runtime history remains separate.
          - id: T6-E2-S2
            name: Track worker execution and workspace health
            status: mostly_complete
            current_state: AgentOrchestrator.get_status() now exposes workspace stats plus worker-execution snapshots, and OperatorReportService surfaces both in the operator report/inbox summary.
            missing: No live UI, push updates, or deeper per-worker telemetry yet.
          - id: T6-E2-S3
            name: Track approval backlog and blocked reasons
            status: complete_for_phase
            current_state: OperatorReportService now exposes approval backlog counts by status/category plus blocked approval reasons, and partial approvals surface as actionable inbox detail instead of disappearing into storage.
            missing: No live UI or push-driven approval inbox yet.
          - id: T6-E2-S4
            name: Add operator-facing reporting surface or inbox
            status: complete_for_phase
            current_state: OperatorReportService, AgentOrchestrator.get_operator_report(), and python -m agent --report now expose an operator-facing inbox/report over shared jobs, approvals, and recent artifacts. The TS operator skeleton mirrors this with a mock reporting view.
            missing: No live web UI or push-based updates yet.
      - id: T6-E3
        name: Quality Evals
        status: mostly_complete
        approx_progress: 99
        stories:
          - id: T6-E3-S1
            name: Build golden review cases
            status: mostly_complete
            current_state: Dedicated tests/test_review_eval_golden.py now pins clean, secret, and unsafe-pattern repo verdicts, CI runs that suite explicitly next to the earlier smoke coverage, and the runtime now reuses the same shared golden fixtures for quality evaluation.
            missing: Cross-version trend telemetry remains future scope.
          - id: T6-E3-S2
            name: Measure finding precision and false positives
            status: mostly_complete
            current_state: ReviewQualityService now runs the deterministic golden cases at runtime, records verdict/count/title precision plus false-positive and false-negative counts as control-plane quality traces, and the operator report exposes the latest review-quality snapshot.
            missing: Quality precision telemetry now exists, but broader release gating and non-review trend surfaces remain future scope.
          - id: T6-E3-S3
            name: Add review eval smoke checks to CI or local gating
            status: complete_for_phase
            current_state: Dedicated `tests/test_review_eval_smoke.py` coverage now validates reviewer handoff artifacts and client-safe redaction, and CI runs that suite explicitly.
            missing: No version-over-version quality or latency telemetry yet.
          - id: T6-E3-S4
            name: Track latency and quality regression across versions
            status: complete_for_phase
            current_state: Review quality evaluation now records release labels, runtime duration, quality deltas versus the previous baseline, and regression posture into the control plane and operator report, and release-readiness now promotes those signals into a real deterministic gate surfaced through CLI, CI, traces, and operator report.
            missing: Longitudinal dashboards remain future scope.

  - id: T7
    name: External Capability Gateway
    goal: Integrate external capability providers cleanly and safely.
    status: in_progress
    approx_progress: 95
    current_state: Runtime model and policy layer now expose explicit gateway defaults plus separate handoff and API-call contracts, and the runtime now enforces approval-aware delivery sends plus owner-operated API calls with gateway traces, cost entries, a concrete obolos.tech provider catalog, readiness-aware routes, retained request or response snapshots, provider-specific request payload shaping, parsed provider receipts, provider outcome classification, provider-backed delivery fallback, and documented buyer-side marketplace access.
    main_gap: Only one provider exists so far, and seller publishing, x402 payment flow, file-upload calls, and broader downstream provider workflow still remain future scope.
    epics:
      - id: T7-E1
        name: Gateway Foundation
        status: mostly_complete
        approx_progress: 95
        stories:
          - id: T7-E1-S1
            name: Define gateway contract for external capabilities
            status: mostly_complete
            current_state: Runtime model and policy now expose both an external_capability_gateway_v1 handoff contract and an external_api_call_v1 invocation contract with request or response, denial, approval, and cost-record expectations, and provider routes can now project richer provider-specific payload and receipt modes on top of those contracts.
            missing: The contracts are stronger, but they are not yet multi-provider or tied to richer operator workflow.
          - id: T7-E1-S2
            name: Add auth, timeout, retry, and rate-limit policy
            status: complete_for_phase
            current_state: External gateway policy now enforces auth, timeout, retry, rate-limit, target-kind, and URL-scheme checks at runtime instead of leaving them only in planning metadata.
            missing: Provider-specific routing and fallback policy remain future scope.
          - id: T7-E1-S3
            name: Add audit and cost tracking for external calls
            status: complete_for_phase
            current_state: Gateway sends now record durable gateway traces, delivery lifecycle events, distinct cost-ledger entries for each gateway run, and provider/route metadata for provider-backed sends.
            missing: Broader provider-specific usage accounting still remains future scope.
          - id: T7-E1-S4
            name: Add policy gating for when external capability use is allowed
            status: mostly_complete
            current_state: Gateway sends now flow through one explicit policy decision path checking approval state, auth presence, target kind, URL scheme, and rate limits before any outbound request is attempted.
            missing: Gating is now provider-aware, but it still does not represent a single unified runtime enforcement engine.
      - id: T7-E2
        name: obolos.tech Integration
        status: in_progress
        stories:
          - id: T7-E2-S1
            name: Represent obolos.tech capabilities through the gateway model
            status: complete_for_phase
            current_state: obolos.tech now exists as an explicit provider inside the gateway model with both legacy delivery-handoff compatibility routes and the first documented buyer-side marketplace capabilities instead of living only as a placeholder.
            missing: Only one provider is modeled so far, and seller-side publishing remains future scope.
          - id: T7-E2-S2
            name: Add capability catalog and routing logic
            status: complete_for_phase
            current_state: The gateway now exposes a provider/capability/route catalog, surfaces route readiness through runtime, reporting, and CLI, resolves ordered candidate routes by provider, capability, job kind, and export mode, and now carries provider-specific request and receipt modes for both delivery handoff and documented API calls.
            missing: Additional providers and broader operator workflow remain future scope.
          - id: T7-E2-S3
            name: Add fallback and failure handling
            status: mostly_complete
            current_state: Provider-backed sends now fall back across configured routes when one route is unavailable, returns retryable downstream failures, or returns an incomplete provider receipt, and buyer-side API calls now surface structured payment-required denials in addition to route-aware failure metadata.
            missing: Additional providers, seller-side workflow, file uploads, and richer downstream workflow still remain future scope.
          - id: T7-E2-S4
            name: Add tests for gateway policy and error modes
            status: complete_for_phase
            current_state: Targeted gateway tests now cover provider route readiness, provider send success, fallback to backup routes, missing-config failures, documented Obolos catalog and wallet-backed API calls, and structured payment-required failures instead of stopping at the earlier generic boundary tests.
            missing: Additional providers and richer downstream error semantics remain future scope.
          - id: T7-E2-S5
            name: Add documented seller-side Obolos publishing and wallet-topup flow
            status: not_started
            current_state: Buyer-side catalog, wallet balance, and slug-based API calls now exist behind the gateway boundary, but seller registration, API publishing, and wallet top-up are not yet modeled.
            missing: The documented seller flow and top-up helper remain future scope.

