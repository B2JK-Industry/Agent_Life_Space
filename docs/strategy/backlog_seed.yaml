            status: in_progress
            current_state: Implemented with fixtures.
            missing: Stronger delivery/report specialization and broader fixture coverage.
          - id: T2-E1-S3
            name: Implement release readiness review job type
            status: mostly_complete
            current_state: Implemented as review overlay.
            missing: Richer release-specific checks and packaging.
          - id: T2-E1-S4
            name: Add shared review job interface and input validation
            status: mostly_complete
            current_state: Intake model and validation exist.
            missing: Unified intake beyond local reviewer flow.

      - id: T2-E2
