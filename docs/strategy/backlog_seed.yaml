            status: complete_for_phase
          - id: T2-E2-S2
            name: Standardize severity, file references, and recommended fixes
            status: complete_for_phase
          - id: T2-E2-S3
            name: Add explicit assumptions, open questions, and low-confidence language
            status: mostly_complete
          - id: T2-E2-S4
            name: Export reports to Markdown and JSON
            status: complete_for_phase
      - id: T2-E3
        name: Review Verification
        status: mostly_complete
        approx_progress: 75
        stories:
          - id: T2-E3-S1
            name: Add verifier pass for review output
            status: complete_for_phase
          - id: T2-E3-S2
            name: Add false-positive reduction strategy
            status: mostly_complete
          - id: T2-E3-S3
            name: Add consistency checks for severity and evidence
            status: mostly_complete
          - id: T2-E3-S4
            name: Record review confidence and verification result
            status: mostly_complete
      - id: T2-E4
        name: Review Delivery
        status: mostly_complete
        approx_progress: 80
        stories:
          - id: T2-E4-S1
            name: Prepare copy-paste-ready PR comments
            status: not_started
          - id: T2-E4-S2
            name: Add delivery approval before external send
            status: complete_for_phase
            current_state: Strict approval gating. delivery_ready=False by default. Blocked without queue.
            missing: External send workflow (Operator scope).
          - id: T2-E4-S3
            name: Add client-safe output mode with redaction
            status: complete_for_phase
            current_state: Full redaction pipeline on all text fields. Strips requester, source, execution_mode, trace.
            missing: Wider system outputs beyond reviewer.
          - id: T2-E4-S4
            name: Add report packaging for operator handoff
            status: mostly_complete
          - id: T2-E4-S5
            name: Route Telegram and API review entrypoints through ReviewService
            status: in_progress
            current_state: Telegram /review routes through ReviewService.
            missing: API review entrypoint.

  - id: T3
    name: Builder Product
    goal: Make implementation controlled, testable, and acceptance-driven.
    status: in_progress
    approx_progress: 45
    current_state: Builder bounded context with models, service, storage, verification loop, acceptance criteria engine, workspace sync, and orchestrator wiring.
    main_gap: No LLM implementation, no real code generation, no review-after-build, and no external build entrypoint yet.
    epics:
      - id: T3-E1
        name: Capability-Based Build Execution
        status: in_progress
        approx_progress: 45
        remaining_gap: Build flow exists and is orchestrator-wired, but the build step is still placeholder-grade and there is no capability catalog.
        stories:
          - id: T3-E1-S1
            name: Define implementation capability catalog
            status: started
            current_state: BuildJobType enum (IMPLEMENTATION, INTEGRATION, DEVOPS, TESTING) exists.
            missing: No capability catalog yet.
          - id: T3-E1-S2
            name: Route implementation jobs to explicit capabilities
            status: started
            current_state: BuildService routes by build_type and is initialized by AgentOrchestrator.
            missing: No explicit capability routing yet.
          - id: T3-E1-S3
            name: Capture patch sets, diffs, and execution traces as artifacts
            status: in_progress
            current_state: BuildArtifact includes patch, diff, verification, acceptance, and trace artifacts persisted via BuildStorage.
          - id: T3-E1-S4
            name: Make execution resumable after interruption
            status: in_progress
            current_state: BuildJob carries workspace_id, timing, and execution_trace. from_dict() recovery exists.
            missing: No resume-from-step capability yet.
      - id: T3-E2
        name: Build Verification Loop
        status: in_progress
        approx_progress: 55
        stories:
          - id: T3-E2-S1
            name: Add test, lint, and type-check loop for implementation jobs
            status: in_progress
            current_state: run_verification_suite() runs test and lint in workspace and adds typecheck automatically when project config is present. Custom commands are supported.
            missing: No build-specific test discovery or review-after-build pass yet.
          - id: T3-E2-S2
            name: Add review-after-build pass before completion
            status: not_started
          - id: T3-E2-S3
            name: Fail jobs clearly when acceptance criteria are not met
            status: in_progress
            current_state: BuildService fails jobs when acceptance criteria are unmet.
            missing: Acceptance evaluation is still rule-based and limited.
          - id: T3-E2-S4
            name: Capture all verification artifacts and verdicts
            status: in_progress
            current_state: Verification results persist as first-class build artifacts.
      - id: T3-E3
        name: Acceptance Criteria Engine
        status: in_progress
        approx_progress: 55
        stories:
          - id: T3-E3-S1
            name: Define acceptance criteria object model
            status: in_progress
            current_state: AcceptanceCriterion supports typed criterion kinds and statuses with meet, fail, and skip transitions.
            missing: No semantic evaluation beyond rule-based checks yet.
          - id: T3-E3-S2
            name: Attach acceptance criteria to jobs
            status: in_progress
            current_state: BuildIntake carries acceptance_criteria and BuildJob inherits them.
            missing: Criteria are attached and checked, but richer requirement matching is still missing.
          - id: T3-E3-S3
            name: Validate criteria at completion time
            status: in_progress
            current_state: AcceptanceVerdict.evaluate() runs at completion, with keyword-bound verification checks and explicit verify commands available.
            missing: No richer semantic checks or domain evaluators yet.
          - id: T3-E3-S4
            name: Produce acceptance reports for delivery
            status: in_progress
            current_state: Acceptance reports are emitted as build artifacts.
            missing: Delivery packaging is still basic.

