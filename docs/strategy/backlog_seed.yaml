next_execution_backlog:
  - priority: P0
    story_id: T7-E1-S2
    title: "Add auth, timeout, retry, and rate-limit policy"
    why_now: "The first external gateway contract now exists, so the next honest step is turning that contract into an enforceable runtime boundary instead of leaving it as planning metadata only."
  - priority: P0
    story_id: T6-E3-S2
    title: "Measure finding precision and false positives"
    why_now: "Golden review cases now exist in CI, so the next quality step is to turn them into tracked quality signals instead of one-time regression fixtures."
  - priority: P1
    story_id: T5-E1-S4
    title: "Ensure policy is deterministic and separately testable"
    why_now: "Structured denials now span more runtime edges, but build, review, gateway, and broader action execution still are not governed by one clearly testable enforcement story."
  - priority: P1
    story_id: T8-E2-S3
    title: "Add configuration discipline for project roots, secrets, and storage"
    why_now: "Runtime/data-handling contracts are clearer, but deployment-grade configuration discipline is still loose across project roots and storage."
  - priority: P1
    story_id: T3-E2-S2
    title: "Add review-after-build pass before completion"
    why_now: "Post-build review already exists and verification discovery is now deeper, so the next builder verification gap is converging that review gate with the wider execution-policy boundary."
  - priority: P2
    story_id: T7-E1-S3
    title: "Add audit and cost tracking for external calls"
    why_now: "The gateway contract now names request/response and denial fields, so the next safe move is durable audit and cost bookkeeping before any real provider integration."
  - priority: P2
    story_id: T7-E1-S4
    title: "Add policy gating for when external capability use is allowed"
    why_now: "The gateway contract and policy defaults both exist now, but they are not yet tied together into one enforceable external-call decision path."
themes:
  - id: T1
    name: Platform Foundation
    goal: Unify job, artifact, state, and workspace foundations.
    status: in_progress
    approx_progress: 96
    current_state: Shared control-plane primitives now back build and review directly, with explicit runtime coexistence rules plus shared build/review/operate job queries, shared artifact queries, persisted product-job/plan/trace/delivery records, retention-aware artifact state with prune support, richer workspace-aware approval/reporting surfaces, and explicit environment profiles for review/build/acquisition/export flows.
    main_gap: No unified cross-domain action layer yet.
    epics:
      - id: T1-E1
        name: Canonical Job Model
        status: in_progress
        approx_progress: 93
        remaining_gap: Shared primitives, shared query models, and persisted product-job records now span build/review/operate-adjacent surfaces, but action-layer convergence is still incomplete.
        stories:
          - id: T1-E1-S1
            name: Define canonical Job schema for review, build, operate, and delivery flows
            status: complete_for_phase
            current_state: Shared JobKind, JobStatus, JobTiming, ExecutionStep, ArtifactKind, ArtifactRef, and UsageSummary now back both BuildJob and ReviewJob directly.
            missing: Delivery/operate convergence rules remain separate scope.
          - id: T1-E1-S2
            name: Add Job lifecycle states and recovery rules
            status: complete_for_phase
            current_state: Shared JobStatus and JobTiming now govern both build and review lifecycle/recovery state.
            missing: Operate/delivery lifecycle harmonization remains.
          - id: T1-E1-S3
            name: Persist job metadata, execution history, artifacts, and cost data
            status: mostly_complete
            current_state: Build and review jobs now sync into shared ProductJobRecord persistence with status, timing, artifact refs, usage summary, persistence policy metadata, and durable per-job cost-ledger entries surfaced through the orchestrator and CLI.
            missing: Task/job-runner/agent-loop history is still separate, and there is no unified action layer on top of the shared records yet.
          - id: T1-E1-S4
            name: Add job queries for operator inspection and automation
            status: complete_for_phase
            current_state: JobQuerySummary/JobQueryDetail and JobQueryService now normalize build, review, task, job-runner, and agent-loop records behind one shared list/get surface. AgentOrchestrator exposes that surface directly.
            missing: Query actions remain read-only; planning/automation layers remain separate scope.
          - id: T1-E1-S5
            name: Reconcile coexistence rules between ReviewJob, JobRunner, Task, and AgentLoop
            status: complete_for_phase
            current_state: RuntimeModelService now makes the coexistence rules explicit: BuildJob/ReviewJob are canonical product jobs, Task remains planning state, JobRunner remains infrastructure execution, and AgentLoop remains an ephemeral conversational queue.
            missing: Rules are explicit, but not yet enforced through stronger invariants or migrations.

      - id: T1-E2
        name: Artifact-First Execution
        status: mostly_complete
        approx_progress: 95
        remaining_gap: Typed artifacts exist across review and build, one shared artifact query/recovery surface spans both bounded contexts, builder now exports deterministic patch/diff artifacts, and retention records now exist, but pruning and deletion workflows remain open.
        stories:
          - id: T1-E2-S1
            name: Define artifact types and storage layout
            status: mostly_complete
          - id: T1-E2-S2
            name: Link artifacts to jobs and execution traces
            status: mostly_complete
          - id: T1-E2-S3
            name: Add export support for Markdown, JSON, and delivery bundles
            status: complete_for_phase
          - id: T1-E2-S4
            name: Add artifact retention and recovery rules
            status: mostly_complete
            current_state: Control-plane retention records now track build, review, trace, and delivery-bundle outputs with policy ids, expiry timestamps, recoverability, derived active/expired state, and an explicit prune workflow surfaced through the orchestrator and CLI.
            missing: No automated pruning scheduler, archival workflow, or broader compaction policy yet.
          - id: T1-E2-S5
            name: Persist full intake, report payloads, and artifact payloads for recovery-safe reload
            status: complete_for_phase
            current_state: ArtifactQueryService now exposes shared build/review artifact list/get recovery, and build/review storage both persist artifact format alongside content/content_json payloads.
            missing: Artifact retention policy and richer builder patch export remain open.

      - id: T1-E3
        name: Workspace And Execution Discipline
        status: in_progress
        approx_progress: 87
        remaining_gap: Builder is workspace-first and reviewer is explicitly READ_ONLY_HOST; shared workspace linkage now exists, but cross-domain workspace policy is still partial.
        stories:
          - id: T1-E3-S1
            name: Ensure all mutable engineering work happens in isolated workspaces
            status: in_progress
            current_state: Builder requires a workspace manager, defaults to WORKSPACE_BOUND, and now syncs repos into managed workspaces before verification.
            missing: Reviewer v1 is still read-only and there is no shared mutable execution model yet.
          - id: T1-E3-S2
            name: Make workspace lifecycle, audit, and recovery robust
            status: mostly_complete
          - id: T1-E3-S3
            name: Link workspace records to jobs, artifacts, and approvals
            status: complete_for_phase
            current_state: WorkspaceQueryService now exposes workspace records as shared control-plane joins over jobs, artifacts, approvals, and delivery bundles, and those records flow through the orchestrator, CLI, and operator report.
            missing: Reviewer still runs in READ_ONLY_HOST, so cross-domain workspace policy is not fully unified yet.
          - id: T1-E3-S4
            name: Add environment profiles for safe execution modes
            status: complete_for_phase
            current_state: Runtime now exposes explicit environment profiles for review_host_read_only, build_workspace_local, repo_import_mirror, and delivery_export_only, and planner/runtime metadata binds those profiles to qualification, execution, and export flows.
            missing: A broader local/operator/enterprise environment matrix still belongs to later enterprise hardening.
          - id: T1-E3-S5
            name: Bind reviewer jobs to workspace discipline or define explicit read-only review execution mode
            status: complete_for_phase
            current_state: ExecutionMode always READ_ONLY_HOST in v1. _get_analysis_path() is single source of truth.
            missing: WORKSPACE_BOUND requires analyzers to read from workspace path (v2 scope).

  - id: T2
    name: Reviewer Product
    goal: Make review a first-class client-ready workflow.
    status: complete_for_phase
    approx_progress: 96
    current_state: Reviewer bounded context, verifier, strict delivery gating, full client-safe redaction, honest execution mode, converged Telegram plus structured API review entrypoints, shared review delivery lifecycle, and reusable operator-summary plus copy-paste PR comment artifacts now flow through the shared runtime.
    main_gap: LLM analysis and richer external delivery automation are v2 scope.
    epics:
      - id: T2-E1
        name: Review Job Types
        status: complete_for_phase
        approx_progress: 92
        stories:
          - id: T2-E1-S1
            name: Implement repo audit job type
            status: complete_for_phase
          - id: T2-E1-S2
            name: Implement PR review job type
            status: in_progress
          - id: T2-E1-S3
            name: Implement release readiness review job type
            status: mostly_complete
          - id: T2-E1-S4
            name: Add shared review job interface and input validation
            status: mostly_complete
      - id: T2-E2
        name: Review Output Standardization
        status: complete_for_phase
        approx_progress: 90
        stories:
          - id: T2-E2-S1
            name: Define canonical report structure
            status: complete_for_phase
          - id: T2-E2-S2
            name: Standardize severity, file references, and recommended fixes
            status: complete_for_phase
          - id: T2-E2-S3
            name: Add explicit assumptions, open questions, and low-confidence language
            status: mostly_complete
          - id: T2-E2-S4
            name: Export reports to Markdown and JSON
            status: complete_for_phase
      - id: T2-E3
        name: Review Verification
        status: mostly_complete
        approx_progress: 75
        stories:
          - id: T2-E3-S1
            name: Add verifier pass for review output
            status: complete_for_phase
          - id: T2-E3-S2
            name: Add false-positive reduction strategy
            status: mostly_complete
          - id: T2-E3-S3
            name: Add consistency checks for severity and evidence
            status: mostly_complete
          - id: T2-E3-S4
            name: Record review confidence and verification result
            status: mostly_complete
      - id: T2-E4
        name: Review Delivery
        status: complete_for_phase
        approx_progress: 96
        stories:
          - id: T2-E4-S1
            name: Prepare copy-paste-ready PR comments
            status: complete_for_phase
            current_state: Review delivery now emits dedicated executive-summary artifacts for an operator summary and copy-paste-ready PR comment markdown, persists them as first-class artifacts, and includes them in shared delivery bundles and client-safe evidence export.
            missing: Direct GitHub posting and richer external delivery automation remain future scope.
          - id: T2-E4-S2
            name: Add delivery approval before external send
            status: complete_for_phase
            current_state: Strict approval gating. delivery_ready=False by default. Blocked without queue.
            missing: External send workflow (Operator scope).
          - id: T2-E4-S3
            name: Add client-safe output mode with redaction
            status: complete_for_phase
            current_state: Full redaction pipeline on all text fields. Strips requester, source, execution_mode, trace.
            missing: Wider system outputs beyond reviewer.
          - id: T2-E4-S4
            name: Add report packaging for operator handoff
            status: complete_for_phase
            current_state: Review delivery now assembles a shared delivery package preview, persists lifecycle state, supports explicit approval linkage, and exposes client-safe evidence packaging for operator handoff.
            missing: PR comment packs and richer external delivery remain future scope.
          - id: T2-E4-S5
            name: Route Telegram and API review entrypoints through ReviewService
            status: complete_for_phase
            current_state: Telegram /review and the structured /api/review endpoint now both route through the shared review runtime, and review intake preserves channel source through recovery-safe persistence.
            missing: PR comment packs and richer external delivery remain future scope.

  - id: T3
    name: Builder Product
    goal: Make implementation controlled, testable, and acceptance-driven.
    status: in_progress
    approx_progress: 95
    current_state: Builder bounded context with models, service, storage, repo-aware verification discovery, workspace sync, capability catalog, resumable checkpoints, orchestrator runtime entrypoint, CLI entrypoint, source-aware build execution policy gating, richer verification and acceptance delivery evidence, a bounded local implementation engine with structured workspace mutations, and structured acceptance criteria flowing through CLI, unified intake, planning, runtime evaluation, and delivery metadata.
    main_gap: No general code generation, no semantic requirement engine, and no external delivery send path yet.
    epics:
      - id: T3-E1
        name: Capability-Based Build Execution
        status: in_progress
        approx_progress: 91
        remaining_gap: Build flow exists, has real runtime entrypoints, declared capabilities, resumable checkpoints, a bounded local implementation engine, and delivery-package preview artifacts, but it still lacks general code generation and wider execution planning.
        stories:
          - id: T3-E1-S1
            name: Define implementation capability catalog
            status: complete_for_phase
            current_state: agent/build/capabilities.py now declares explicit implementation, integration, devops, and testing capabilities with verification defaults, target patterns, resume support, and review-after-build defaults.
            missing: External provider routing remains future scope.
          - id: T3-E1-S2
            name: Expose builder through a real product entrypoint
            status: mostly_complete
            current_state: AgentOrchestrator now exposes run_build_job(), python -m agent --build-repo ... routes builder work through the shared runtime, and that CLI can now load a structured implementation plan from JSON for bounded local execution.
            missing: No operator/chat/API entrypoint yet, and capability routing remains separate scope.
          - id: T3-E1-S3
            name: Capture patch sets, diffs, and execution traces as artifacts
            status: complete_for_phase
            current_state: Builder now captures deterministic patch + diff artifacts by comparing source repo and workspace, alongside verification, acceptance, review, finding-list, and trace artifacts persisted via BuildStorage.
            missing: Patch export is honest, but audit-only builds still have no structured workspace mutations to capture.
          - id: T3-E1-S4
            name: Make execution resumable after interruption
            status: mostly_complete
            current_state: BuildJob now records checkpoints, resume lineage, and can resume through BuildService.resume_build() and python -m agent --build-resume ..., reusing successful phases and rerunning failed ones.
            missing: No planner-driven or distributed-worker resume policy yet.
          - id: T3-E1-S5
            name: Replace placeholder build step with a bounded local implementation engine
            status: mostly_complete
            current_state: BuildService now executes structured workspace mutations (write_file, append_text, replace_text, json_set) through a bounded local engine, persists per-operation results, and exposes implementation mode plus execution summaries through job metadata, delivery bundles, CLI, and planning surfaces.
            missing: Execution still depends on an explicit structured plan; there is no freeform or LLM-backed code generation yet.
      - id: T3-E2
        name: Build Verification Loop
        status: in_progress
        approx_progress: 96
        stories:
          - id: T3-E2-S1
            name: Add test, lint, and type-check loop for implementation jobs
            status: mostly_complete
            current_state: Builder now performs repo-aware verification discovery for test, lint, and typecheck surfaces across Python config, package scripts, Makefile targets, CI workflow hints, and repo-local toolchains before running the discovered suite in the workspace. Custom commands remain available underneath the verification layer.
            missing: Discovery is deeper and more honest, but still deterministic rather than a full language-specific execution planner.
          - id: T3-E2-S2
            name: Add review-after-build pass before completion
            status: mostly_complete
            current_state: Successful build jobs can now request a deterministic post-build review pass through ReviewService, persist review artifacts, feed review signals into acceptance + delivery output, and gate completion through explicit review_gate_policy_id profiles.
            missing: Reviewer still operates in READ_ONLY_HOST mode over the built workspace path, and policy is not yet unified with the wider execution boundary.
          - id: T3-E2-S3
            name: Fail jobs clearly when acceptance criteria are not met
            status: complete_for_phase
            current_state: BuildService now fails builds with structured denial payloads and detailed unmet-required-criterion summaries instead of generic count-only rejection strings, while delivery summaries expose the same blocking-vs-optional acceptance state.
            missing: The acceptance engine is still deterministic and rule-based; there is no semantic requirement model yet.
          - id: T3-E2-S4
            name: Capture all verification artifacts and verdicts
            status: complete_for_phase
            current_state: Verification now persists one suite-level report plus per-step verification artifacts, and build delivery bundles expose those artifact ids and summaries for operator handoff.
            missing: Discovery remains heuristic and evidence export does not yet add richer language-specific interpretation.
      - id: T3-E3
        name: Acceptance Criteria Engine
        status: in_progress
        approx_progress: 93
        stories:
          - id: T3-E3-S1
            name: Define acceptance criteria object model
            status: complete_for_phase
            current_state: AcceptanceCriterion now has explicit kind, required-vs-optional semantics, evaluator hints, typed status transitions, and lightweight parsing from operator/CLI strings into a more structured builder-facing object model.
            missing: The object model is stronger, but semantic requirement matching is still outside the current deterministic evaluator set.
          - id: T3-E3-S2
            name: Attach acceptance criteria to jobs
            status: mostly_complete
            current_state: BuildIntake carries structured AcceptanceCriterion objects, BuildJob inherits them, CLI can now load acceptance criteria from JSON, unified operator intake accepts both lightweight strings and richer criterion objects, and JobPlan now exposes acceptance summaries with required, optional, structured, and evaluator breakdown before execution.
            missing: Acceptance criteria are now first-class in intake and planning, but semantic requirement matching is still missing.
          - id: T3-E3-S3
            name: Validate criteria at completion time
            status: complete_for_phase
            current_state: Completion-time validation now supports keyword-bound verification checks, explicit verify commands executed in the workspace, metadata-driven verification kind targeting, structured workspace file, text, and JSON checks, structured change-set path, count, and docs checks, and structured review-threshold checks.
            missing: No semantic acceptance engine beyond deterministic rule-based evaluators yet.
          - id: T3-E3-S4
            name: Produce acceptance reports for delivery
            status: complete_for_phase
            current_state: Acceptance reports are emitted as build artifacts and now include delivery-usable summaries, criteria grouped by status, verification outcome, and review verdict metadata that flow into build delivery bundles.
            missing: Acceptance semantics are still deterministic and rule-based; there is no richer semantic requirement model yet.

  - id: T4
    name: Operator Product
    goal: Coordinate end-to-end work and delivery.
    status: in_progress
    approx_progress: 94
    current_state: Unified intake routing, phase-aware JobPlan preview and submit output, persisted planner handoff records, planning traces, runtime budget blocking, managed repo acquisition/import, pre-execution approval gating, workspace joins, richer operator report service, internal and client-safe evidence export, shared build and review delivery lifecycle, operation-count-aware builder planning, and acceptance-summary-aware planning now exist alongside CI typecheck.
    main_gap: No live backend/UI and no full external delivery workflow yet.
    epics:
      - id: T4-E1
        name: Intake And Qualification
        status: in_progress
        approx_progress: 95
        stories:
          - id: T4-E1-S1
            name: Create intake model for repo paths, git URLs, diff ranges, and work type
            status: complete_for_phase
            current_state: agent/control/intake.py now defines a unified operator intake envelope for repo paths, git URLs, diff ranges, work type, build type, structured acceptance criteria, structured builder implementation plans, routing metadata, and managed acquisition hints for supported git sources.
            missing: Live operator UI and broader remote-provider workflows remain outside the current phase.
          - id: T4-E1-S2
            name: Add qualification logic for scope, risk, and budget
            status: mostly_complete
            current_state: OperatorIntakeService.qualify() plus JobPlan creation now resolve scope size, scope signals, risk factors, and a policy-backed budget envelope using BudgetPolicy plus live finance budget state when available.
            missing: Cost estimates are still deterministic heuristics, and there is no live operator UI.
          - id: T4-E1-S3
            name: Add operator-facing intake summary and recommended plan
            status: complete_for_phase
            current_state: python -m agent --intake-* --intake-preview now returns qualification plus a structured JobPlan with acceptance-summary metadata, and preview/submit both persist a first-class plan record for later operator handoff through orchestrator and CLI list/get surfaces.
            missing: No live operator UI yet.
          - id: T4-E1-S4
            name: Reject unsupported work cleanly and honestly
            status: complete_for_phase
            current_state: Unified intake now rejects unsupported git inputs honestly, returns explicit blocked or awaiting_approval runtime states, and can acquire supported sources into a managed local mirror before routing runtime work.
            missing: Broader remote acquisition behavior still depends on host/network policy and there is no live operator UI.
      - id: T4-E2
        name: Job Planning And Routing
        status: in_progress
        approx_progress: 87
        stories:
          - id: T4-E2-S1
            name: Create JobPlan model and planner outputs
            status: complete_for_phase
            current_state: JobPlan, JobPlanStep, JobPlanPhase, JobPlanCapability, and JobPlanBudgetEnvelope now exist in agent/control/intake.py, planner output is surfaced through preview/submit flows plus persisted JobPlanRecord handoff state, and builder planning now carries operation-count-aware execution metadata plus acceptance-summary detail.
            missing: Planner output is durable, but not yet a distributed execution history.
          - id: T4-E2-S2
            name: Split work into review, build, verify, deliver phases
            status: complete_for_phase
            current_state: Planner output now exposes explicit qualify, review, build, verify, and deliver phases, with phase-aware steps for both review and build routes.
            missing: Planner phases are still preview/submit constructs rather than persisted execution history.
          - id: T4-E2-S3
            name: Assign capabilities and budget envelopes
            status: mostly_complete
            current_state: Planner output now assigns concrete build catalog capabilities plus planner profiles for review, verify, and deliver phases, alongside structured budget envelope metadata.
            missing: Only the build phase currently binds to a runtime capability catalog; the remaining phase assignments are planner profiles.
          - id: T4-E2-S4
            name: Record execution traces for planning decisions
            status: complete_for_phase
            current_state: Qualification, budget, capability, and delivery decisions now emit durable ExecutionTraceRecord entries that can be listed and filtered through the shared control-plane surface.
            missing: Trace coverage is still strongest for planning/build delivery, not yet the whole runtime.
      - id: T4-E3
        name: Delivery Workflow
        status: mostly_complete
        approx_progress: 90
        stories:
          - id: T4-E3-S1
            name: Define delivery package model
            status: complete_for_phase
            current_state: Shared DeliveryPackage model now exists in agent/control/models.py and is used by both builder and reviewer delivery preview flows.
            missing: Delivery remains preview and handoff oriented; external send is still later scope.
          - id: T4-E3-S2
            name: Assemble artifacts, reports, and acceptance results into delivery bundles
            status: complete_for_phase
            current_state: Builder assembles verification, acceptance, patch, diff, review, findings, and workspace metadata into delivery package previews, and reviewer now assembles report, findings, trace, approval linkage, and bundle metadata into the same shared lifecycle envelope.
            missing: There is still no live operator workflow or external send path behind the bundle.
          - id: T4-E3-S3
            name: Gate delivery through approvals
            status: complete_for_phase
            current_state: Review and build delivery both request approval with explicit job, artifact, workspace, and bundle linkage while refreshing lifecycle status after approval changes.
            missing: Richer approval chains and real external send remain future scope.
          - id: T4-E3-S4
            name: Record delivery status and handoff audit events
            status: mostly_complete
            current_state: Build and review delivery now persist lifecycle state (prepared, awaiting_approval, approved, rejected, handed_off) plus explicit audit events surfaced through the orchestrator, CLI, workspace joins, and operator report.
            missing: Delivery events still stop at handoff; no external send execution history yet.

  - id: T5
    name: Security, Governance, And Policy
    goal: Ensure all valuable workflows remain controlled and auditable.
    status: in_progress
    approx_progress: 95
    current_state: Tool policy deny-by-default, strict delivery approval, full redaction pipeline, persistent/queryable approvals with job/artifact/workspace/bundle linkage, deterministic review-gate, delivery, review-execution, and build-execution policy profiles, multi-step approval thresholds, plus shared job-persistence, artifact-retention, gateway-default policies, and broader structured denial payloads across build, review, tool, web, social, and finance-facing blocked flows.
    main_gap: Build and broader runtime action flow still sit outside a single unified policy enforcement boundary.
    epics:
      - id: T5-E1
        name: Policy Control Plane
        status: in_progress
        approx_progress: 91
        stories:
          - id: T5-E1-S1
            name: Extend policy model to job, artifact, delivery, and gateway decisions
            status: mostly_complete
            current_state: Shared policy now covers deterministic job-persistence, artifact-retention, delivery, review-gate, and external-gateway defaults, and those policies surface through control-plane persistence, artifact queries, reporting, and delivery metadata.
            missing: Repository/diff execution and broader runtime actions are still not enforced through one shared policy engine.
          - id: T5-E1-S2
            name: Keep policy deny-by-default across execution modes
            status: mostly_complete
            current_state: Deny-by-default is now explicit across review execution, tool execution, operator intake blockers, evidence export, build/review delivery approval plus handoff flows, and source-aware build execution policies, all with stable operator-visible denial payloads.
            missing: Build implementation execution and some broader runtime actions still do not run under one shared enforcement boundary.
          - id: T5-E1-S3
            name: Add structured denial reasons everywhere
            status: complete_for_phase
            current_state: Structured denial payloads now cover tool policy, operator intake, build/review validation and delivery blockers, evidence export, operator reporting attention detail, finance budget blockers, web access failures, tool-execution failures, and social/API request errors.
            missing: One unified runtime enforcement engine is still separate scope.
          - id: T5-E1-S4
            name: Ensure policy is deterministic and separately testable
            status: mostly_complete
          - id: T5-E1-S5
            name: Bring repository and diff analysis under shared execution and policy boundary
            status: complete_for_phase
            current_state: Review-side repository and diff access now uses explicit deterministic review execution policies, and those decisions are recorded as durable control-plane review-policy traces and product-job metadata.
            missing: Builder execution is still not governed by the same policy engine.
      - id: T5-E2
        name: Approval Model
        status: in_progress
        approx_progress: 86
        stories:
          - id: T5-E2-S1
            name: Make approval requests persistent and queryable
            status: complete_for_phase
            current_state: ApprovalStorage persists approval lifecycle state, ApprovalQueue recovers it, and approvals can now be queried by status/category/job/artifact/workspace/bundle linkage.
            missing: Shared delivery/workspace policy queries remain separate scope.
          - id: T5-E2-S2
            name: Support approvals for risky execution and external delivery
            status: mostly_complete
            current_state: Review and build delivery remain approval-gated, and unified intake can now request finance approval for budget-sensitive work plus tool approval for high-risk execution before a job starts.
            missing: Multi-step approval workflows and broader policy/action unification remain open.
          - id: T5-E2-S3
            name: Support multi-step approvals where needed
            status: mostly_complete
            current_state: Unified intake and build/review delivery approvals can now require more than one approval deterministically based on budget posture, risk level, build type, review severity, and delivery scope.
