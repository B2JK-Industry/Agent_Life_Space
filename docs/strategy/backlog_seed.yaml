    main_gap: LLM analysis and richer external delivery automation are v2 scope.
    epics:
      - id: T2-E1
        name: Review Job Types
        status: complete_for_phase
        approx_progress: 92
        stories:
          - id: T2-E1-S1
            name: Implement repo audit job type
            status: complete_for_phase
          - id: T2-E1-S2
            name: Implement PR review job type
            status: in_progress
          - id: T2-E1-S3
            name: Implement release readiness review job type
            status: mostly_complete
          - id: T2-E1-S4
            name: Add shared review job interface and input validation
            status: mostly_complete
      - id: T2-E2
        name: Review Output Standardization
        status: complete_for_phase
        approx_progress: 90
        stories:
          - id: T2-E2-S1
            name: Define canonical report structure
            status: complete_for_phase
          - id: T2-E2-S2
            name: Standardize severity, file references, and recommended fixes
            status: complete_for_phase
          - id: T2-E2-S3
            name: Add explicit assumptions, open questions, and low-confidence language
            status: mostly_complete
          - id: T2-E2-S4
            name: Export reports to Markdown and JSON
            status: complete_for_phase
      - id: T2-E3
        name: Review Verification
        status: mostly_complete
        approx_progress: 75
        stories:
          - id: T2-E3-S1
            name: Add verifier pass for review output
            status: complete_for_phase
          - id: T2-E3-S2
            name: Add false-positive reduction strategy
            status: mostly_complete
          - id: T2-E3-S3
            name: Add consistency checks for severity and evidence
            status: mostly_complete
          - id: T2-E3-S4
            name: Record review confidence and verification result
            status: mostly_complete
      - id: T2-E4
        name: Review Delivery
        status: complete_for_phase
        approx_progress: 96
        stories:
          - id: T2-E4-S1
            name: Prepare copy-paste-ready PR comments
            status: complete_for_phase
            current_state: Review delivery now emits dedicated executive-summary artifacts for an operator summary and copy-paste-ready PR comment markdown, persists them as first-class artifacts, and includes them in shared delivery bundles and client-safe evidence export.
            missing: Direct GitHub posting and richer external delivery automation remain future scope.
          - id: T2-E4-S2
            name: Add delivery approval before external send
            status: complete_for_phase
            current_state: Strict approval gating. delivery_ready=False by default. Blocked without queue.
            missing: External send workflow (Operator scope).
          - id: T2-E4-S3
            name: Add client-safe output mode with redaction
            status: complete_for_phase
            current_state: Full redaction pipeline on all text fields. Strips requester, source, execution_mode, trace.
            missing: Wider system outputs beyond reviewer.
          - id: T2-E4-S4
            name: Add report packaging for operator handoff
            status: complete_for_phase
            current_state: Review delivery now assembles a shared delivery package preview, persists lifecycle state, supports explicit approval linkage, and exposes client-safe evidence packaging for operator handoff.
            missing: PR comment packs and richer external delivery remain future scope.
          - id: T2-E4-S5
            name: Route Telegram and API review entrypoints through ReviewService
            status: complete_for_phase
            current_state: Telegram /review and the structured /api/review endpoint now both route through the shared review runtime, and review intake preserves channel source through recovery-safe persistence.
            missing: PR comment packs and richer external delivery remain future scope.

  - id: T3
    name: Builder Product
    goal: Make implementation controlled, testable, and acceptance-driven.
    status: complete_for_phase
    approx_progress: 99
    current_state: Builder bounded context with models, service, storage, repo-aware verification discovery, workspace sync, capability catalog, resumable checkpoints, orchestrator runtime entrypoint, CLI entrypoint, source-aware build execution policy gating, richer verification and acceptance delivery evidence, a bounded local implementation engine with insert/delete-safe plus copy or move workspace mutations, capability guardrails, implementation-backed acceptance criteria, release-readiness gating, and an explicit gateway send path for approved build bundles.
    main_gap: No general code generation and no semantic requirement engine yet, but those now sit beyond the current Phase 2 closure scope.
    epics:
      - id: T3-E1
        name: Capability-Based Build Execution
        status: complete_for_phase
        approx_progress: 98
        remaining_gap: Runtime entrypoints, declared capabilities, resumable checkpoints, a bounded local implementation engine, and delivery-package preview artifacts now cover the honest deterministic builder slice; general code generation remains future scope.
        stories:
          - id: T3-E1-S1
            name: Define implementation capability catalog
            status: complete_for_phase
            current_state: agent/build/capabilities.py now declares explicit implementation, integration, devops, and testing capabilities with verification defaults, target patterns, resume support, and review-after-build defaults.
            missing: External provider routing remains future scope.
          - id: T3-E1-S2
            name: Expose builder through a real product entrypoint
            status: mostly_complete
            current_state: AgentOrchestrator now exposes run_build_job(), python -m agent --build-repo ... routes builder work through the shared runtime, and that CLI can now load a structured implementation plan from JSON for bounded local execution.
            missing: No operator/chat/API entrypoint yet, and capability routing remains separate scope.
          - id: T3-E1-S3
            name: Capture patch sets, diffs, and execution traces as artifacts
            status: complete_for_phase
            current_state: Builder now captures deterministic patch + diff artifacts by comparing source repo and workspace, alongside verification, acceptance, review, finding-list, and trace artifacts persisted via BuildStorage.
            missing: Patch export is honest, but audit-only builds still have no structured workspace mutations to capture.
          - id: T3-E1-S4
            name: Make execution resumable after interruption
            status: mostly_complete
            current_state: BuildJob now records checkpoints, resume lineage, and can resume through BuildService.resume_build() and python -m agent --build-resume ..., reusing successful phases and rerunning failed ones.
            missing: No planner-driven or distributed-worker resume policy yet.
          - id: T3-E1-S5
            name: Replace placeholder build step with a bounded local implementation engine
            status: complete_for_phase
            current_state: BuildService now executes structured workspace mutations (write_file, append_text, replace_text, insert_before_text, insert_after_text, delete_text, delete_file, copy_file, move_file, json_set) through a bounded local engine, enforces deterministic operation-count plus source and target-scope guardrails, persists per-operation results, and exposes implementation mode plus execution summaries through job metadata, delivery bundles, CLI, and planning surfaces.
            missing: Execution still depends on an explicit structured plan; there is no freeform or LLM-backed code generation yet.
      - id: T3-E2
        name: Build Verification Loop
        status: in_progress
        approx_progress: 96
        stories:
          - id: T3-E2-S1
            name: Add test, lint, and type-check loop for implementation jobs
            status: mostly_complete
            current_state: Builder now performs repo-aware verification discovery for test, lint, and typecheck surfaces across Python config, package scripts, Makefile targets, CI workflow hints, and repo-local toolchains before running the discovered suite in the workspace. Custom commands remain available underneath the verification layer.
            missing: Discovery is deeper and more honest, but still deterministic rather than a full language-specific execution planner.
          - id: T3-E2-S2
            name: Add review-after-build pass before completion
            status: mostly_complete
            current_state: Successful build jobs can now request a deterministic post-build review pass through ReviewService, persist review artifacts, feed review signals into acceptance + delivery output, and gate completion through explicit review_gate_policy_id profiles.
            missing: Reviewer still operates in READ_ONLY_HOST mode over the built workspace path, and policy is not yet unified with the wider execution boundary.
          - id: T3-E2-S3
            name: Fail jobs clearly when acceptance criteria are not met
            status: complete_for_phase
            current_state: BuildService now fails builds with structured denial payloads and detailed unmet-required-criterion summaries instead of generic count-only rejection strings, while delivery summaries expose the same blocking-vs-optional acceptance state.
            missing: The acceptance engine is still deterministic and rule-based; there is no semantic requirement model yet.
          - id: T3-E2-S4
            name: Capture all verification artifacts and verdicts
            status: complete_for_phase
            current_state: Verification now persists one suite-level report plus per-step verification artifacts, and build delivery bundles expose those artifact ids and summaries for operator handoff.
            missing: Discovery remains heuristic and evidence export does not yet add richer language-specific interpretation.
      - id: T3-E3
        name: Acceptance Criteria Engine
        status: complete_for_phase
        approx_progress: 96
        stories:
          - id: T3-E3-S1
            name: Define acceptance criteria object model
            status: complete_for_phase
            current_state: AcceptanceCriterion now has explicit kind, required-vs-optional semantics, evaluator hints, typed status transitions, and lightweight parsing from operator/CLI strings into a more structured builder-facing object model.
            missing: The object model is stronger, but semantic requirement matching is still outside the current deterministic evaluator set.
          - id: T3-E3-S2
            name: Attach acceptance criteria to jobs
            status: complete_for_phase
            current_state: BuildIntake carries structured AcceptanceCriterion objects, BuildJob inherits them, CLI can now load acceptance criteria from JSON, unified operator intake accepts both lightweight strings and richer criterion objects, JobPlan exposes acceptance summaries before execution, and delivery-ready reports now include implementation-backed acceptance summaries over changed operations, changed paths, operation types, and implementation mode.
            missing: Semantic requirement matching is still outside the current deterministic evaluator set.
          - id: T3-E3-S3
            name: Validate criteria at completion time
            status: complete_for_phase
            current_state: Completion-time validation now supports keyword-bound verification checks, explicit verify commands executed in the workspace, metadata-driven verification kind targeting, structured workspace file, text, and JSON checks, structured change-set path, count, and docs checks, and structured review-threshold checks.
            missing: No semantic acceptance engine beyond deterministic rule-based evaluators yet.
          - id: T3-E3-S4
            name: Produce acceptance reports for delivery
            status: complete_for_phase
            current_state: Acceptance reports are emitted as build artifacts and now include delivery-usable summaries, criteria grouped by status, verification outcome, and review verdict metadata that flow into build delivery bundles.
            missing: Acceptance semantics are still deterministic and rule-based; there is no richer semantic requirement model yet.

  - id: T4
    name: Operator Product
    goal: Coordinate end-to-end work and delivery.
    status: in_progress
    approx_progress: 97
    current_state: Unified intake routing, phase-aware JobPlan preview and submit output, persisted planner handoff records, planning traces, runtime budget blocking, managed repo acquisition/import, pre-execution approval gating, workspace joins, richer operator report service, internal and client-safe evidence export, shared build and review delivery lifecycle, operation-count-aware builder planning, acceptance-summary-aware planning, explicit gateway handoff actions, provider-outcome-aware operator reporting, release-readiness traces, and Telegram operator surface with /report, /intake, and /build commands now exist alongside CI typecheck.
    main_gap: No live backend/UI and no richer active provider-specific operator workflow yet.
    epics:
      - id: T4-E1
        name: Intake And Qualification
        status: in_progress
        approx_progress: 95
        stories:
          - id: T4-E1-S1
            name: Create intake model for repo paths, git URLs, diff ranges, and work type
            status: complete_for_phase
            current_state: agent/control/intake.py now defines a unified operator intake envelope for repo paths, git URLs, diff ranges, work type, build type, structured acceptance criteria, structured builder implementation plans, routing metadata, and managed acquisition hints for supported git sources.
            missing: Live operator UI and broader remote-provider workflows remain outside the current phase.
          - id: T4-E1-S2
            name: Add qualification logic for scope, risk, and budget
            status: mostly_complete
            current_state: OperatorIntakeService.qualify() plus JobPlan creation now resolve scope size, scope signals, risk factors, and a policy-backed budget envelope using BudgetPolicy plus live finance budget state when available.
            missing: Cost estimates are still deterministic heuristics, and there is no live operator UI.
          - id: T4-E1-S3
            name: Add operator-facing intake summary and recommended plan
            status: complete_for_phase
            current_state: python -m agent --intake-* --intake-preview now returns qualification plus a structured JobPlan with acceptance-summary metadata, and preview/submit both persist a first-class plan record for later operator handoff through orchestrator and CLI list/get surfaces.
            missing: No live operator UI yet.
          - id: T4-E1-S4
            name: Reject unsupported work cleanly and honestly
            status: complete_for_phase
            current_state: Unified intake now rejects unsupported git inputs honestly, returns explicit blocked or awaiting_approval runtime states, and can acquire supported sources into a managed local mirror before routing runtime work.
            missing: Broader remote acquisition behavior still depends on host/network policy and there is no live operator UI.
      - id: T4-E2
        name: Job Planning And Routing
        status: in_progress
        approx_progress: 87
        stories:
          - id: T4-E2-S1
            name: Create JobPlan model and planner outputs
            status: complete_for_phase
            current_state: JobPlan, JobPlanStep, JobPlanPhase, JobPlanCapability, and JobPlanBudgetEnvelope now exist in agent/control/intake.py, planner output is surfaced through preview/submit flows plus persisted JobPlanRecord handoff state, and builder planning now carries operation-count-aware execution metadata plus acceptance-summary detail.
            missing: Planner output is durable, but not yet a distributed execution history.
          - id: T4-E2-S2
            name: Split work into review, build, verify, deliver phases
            status: complete_for_phase
            current_state: Planner output now exposes explicit qualify, review, build, verify, and deliver phases, with phase-aware steps for both review and build routes.
            missing: Planner phases are still preview/submit constructs rather than persisted execution history.
          - id: T4-E2-S3
            name: Assign capabilities and budget envelopes
            status: mostly_complete
            current_state: Planner output now assigns concrete build catalog capabilities plus planner profiles for review, verify, and deliver phases, alongside structured budget envelope metadata.
            missing: Only the build phase currently binds to a runtime capability catalog; the remaining phase assignments are planner profiles.
          - id: T4-E2-S4
            name: Record execution traces for planning decisions
            status: complete_for_phase
            current_state: Qualification, budget, capability, and delivery decisions now emit durable ExecutionTraceRecord entries that can be listed and filtered through the shared control-plane surface.
            missing: Trace coverage is still strongest for planning/build delivery, not yet the whole runtime.
      - id: T4-E3
        name: Delivery Workflow
        status: mostly_complete
        approx_progress: 96
        stories:
          - id: T4-E3-S1
            name: Define delivery package model
            status: complete_for_phase
            current_state: Shared DeliveryPackage model now exists in agent/control/models.py and is used by both builder and reviewer delivery preview flows.
            missing: Provider-specific delivery targets and richer operator workflow remain later scope.
          - id: T4-E3-S2
            name: Assemble artifacts, reports, and acceptance results into delivery bundles
            status: complete_for_phase
            current_state: Builder assembles verification, acceptance, patch, diff, review, findings, and workspace metadata into delivery package previews, reviewer assembles report, findings, trace, approval linkage, and bundle metadata into the same shared lifecycle envelope, and both bundles can now flow through the explicit gateway boundary after approval.
            missing: There is still no live operator workflow or provider-specific send routing behind the bundle.
          - id: T4-E3-S3
            name: Gate delivery through approvals
            status: complete_for_phase
            current_state: Review and build delivery both request approval with explicit job, artifact, workspace, and bundle linkage while refreshing lifecycle status after approval changes.
            missing: Richer approval chains and provider-specific send remain future scope.
          - id: T4-E3-S4
            name: Record delivery status and handoff audit events
            status: complete_for_phase
            current_state: Build and review delivery now persist lifecycle state (prepared, awaiting_approval, approved, rejected, handed_off) plus explicit audit events for gateway request, success, and failure, and provider-specific outcomes now flow into delivery summaries, operator report summaries, inbox attention, and recent provider-delivery views.
            missing: Broader active operator workflow and live UI remain future scope.
      - id: T4-E4
        name: Operator Telegram Surface
        status: complete_for_phase
        approx_progress: 100
        remaining_gap: Telegram surface delegates to existing operator services; richer interactive flows and live UI remain future scope.
        stories:
          - id: T4-E4-S1
            name: "/report Telegram command"
            status: complete_for_phase
            current_state: Operator report accessible from Telegram with overview/inbox/budget views.
            missing: Live interactive drill-down and richer formatting remain future scope.
          - id: T4-E4-S2
            name: "/intake Telegram command"
            status: complete_for_phase
            current_state: "Unified intake qualify→plan→execute flow accessible from Telegram."
            missing: Richer conversational intake and multi-step Telegram approval remain future scope.
          - id: T4-E4-S3
            name: "/build Telegram shortcut"
            status: complete_for_phase
            current_state: Build intake shortcut delegates to unified /intake.
            missing: Direct build-specific Telegram options remain future scope.

  - id: T5
    name: Security, Governance, And Policy
    goal: Ensure all valuable workflows remain controlled and auditable.
    status: in_progress
    approx_progress: 99
    current_state: Tool policy deny-by-default, strict delivery approval, full redaction pipeline, persistent/queryable approvals with job/artifact/workspace/bundle linkage, deterministic review-gate, delivery, review-execution, and build-execution policy profiles, multi-step approval thresholds, provider-aware gateway routes and readiness checks, provider receipt validation, builder capability guardrails, release-readiness thresholds, shared job-persistence, artifact-retention, gateway-default policies, runtime gateway access evaluation, and broader structured denial payloads across build, review, tool, web, social, and finance-facing blocked flows.
    main_gap: Build and broader runtime action flow still sit outside a single unified policy enforcement boundary.
    epics:
      - id: T5-E1
        name: Policy Control Plane
        status: in_progress
        approx_progress: 99
        stories:
          - id: T5-E1-S1
            name: Extend policy model to job, artifact, delivery, and gateway decisions
            status: mostly_complete
            current_state: Shared policy now covers deterministic job-persistence, artifact-retention, delivery, review-gate, and external-gateway defaults, and those policies surface through control-plane persistence, artifact queries, reporting, and delivery metadata.
            missing: Repository/diff execution and broader runtime actions are still not enforced through one shared policy engine.
          - id: T5-E1-S2
            name: Keep policy deny-by-default across execution modes
            status: mostly_complete
            current_state: Deny-by-default is now explicit across review execution, tool execution, operator intake blockers, evidence export, build/review delivery approval plus handoff flows, and source-aware build execution policies, all with stable operator-visible denial payloads.
            missing: Build implementation execution and some broader runtime actions still do not run under one shared enforcement boundary.
