next_execution_backlog:
  - priority: P0
    story_id: T3-E1-S2
    title: "Expose builder through a real product entrypoint"
    why_now: "Builder is now tracked and orchestrator-wired, but there is still no API/chat/operator path that starts build jobs."
  - priority: P0
    story_id: T3-E2-S2
    title: "Add review-after-build before completion"
    why_now: "Builder verifies code mechanically but still lacks a reviewer pass before delivery-ready completion."
  - priority: P0
    story_id: T1-E1-S4
    title: "Add cross-system job query layer"
    why_now: "Review and build now both produce useful persisted state, but operator/runtime inspection is still fragmented."
  - priority: P1
    story_id: T1-E1-S1
    title: "Migrate ReviewJob onto shared control-plane primitives"
    why_now: "Builder already consumes shared primitives directly; reviewer remains the main convergence holdout."
  - priority: P1
    story_id: T5-E2-S1
    title: "Persist approval requests and link them to jobs/artifacts"
    why_now: "Delivery gating exists, but approvals are still not durable enough for enterprise-grade audit trails."
  - priority: P1
    story_id: T6-E2-S4
    title: "Add operator-facing reporting surface"
    why_now: "Local status counters exist now, but there is no operator UI or inbox for acting on them."
themes:
  - id: T1
    name: Platform Foundation
    goal: Unify job, artifact, state, and workspace foundations.
    status: in_progress
    approx_progress: 62
    current_state: Shared control-plane primitives, ReviewJob recovery/artifact hydration, workspace subsystem, and orchestrator-wired build/review services with local status visibility.
    main_gap: ReviewJob does not yet use shared primitives directly across the system.
    epics:
      - id: T1-E1
        name: Canonical Job Model
        status: in_progress
        approx_progress: 45
        remaining_gap: Shared primitives exist, but ReviewJob, JobRunner, Task, and AgentLoop still coexist without convergence.
        stories:
          - id: T1-E1-S1
            name: Define canonical Job schema for review, build, operate, and delivery flows
            status: in_progress
            current_state: Shared JobKind, JobStatus, JobTiming, ExecutionStep, ArtifactKind, ArtifactRef, and UsageSummary exist in agent/control/models.py. BuildJob uses them directly.
            missing: ReviewJob still needs migration to shared primitives.
          - id: T1-E1-S2
            name: Add Job lifecycle states and recovery rules
            status: in_progress
            current_state: Shared JobStatus and JobTiming exist. BuildJob uses them for lifecycle and recovery.
            missing: ReviewJob still uses its own lifecycle model.
          - id: T1-E1-S3
            name: Persist job metadata, execution history, artifacts, and cost data
            status: in_progress
            current_state: BuildStorage persists job metadata, execution history, artifacts, and usage summary. Review artifacts recover metadata safely.
            missing: No unified cross-system persistence or query layer.
          - id: T1-E1-S4
            name: Add job queries for operator inspection and automation
            status: not_started
          - id: T1-E1-S5
            name: Reconcile coexistence rules between ReviewJob, JobRunner, Task, and AgentLoop
            status: in_progress
            current_state: BuildJob uses shared primitives; ReviewJob, JobRunner, Task, and AgentLoop still coexist.
            missing: Explicit convergence rules or phased deprecation plan.

      - id: T1-E2
        name: Artifact-First Execution
        status: mostly_complete
        approx_progress: 75
        remaining_gap: Typed artifacts exist across review and build, but shared artifact query and recovery are not yet cross-domain.
        stories:
          - id: T1-E2-S1
            name: Define artifact types and storage layout
            status: mostly_complete
          - id: T1-E2-S2
            name: Link artifacts to jobs and execution traces
            status: mostly_complete
          - id: T1-E2-S3
            name: Add export support for Markdown, JSON, and delivery bundles
            status: complete_for_phase
          - id: T1-E2-S4
            name: Add artifact retention and recovery rules
            status: started
          - id: T1-E2-S5
            name: Persist full intake, report payloads, and artifact payloads for recovery-safe reload
            status: mostly_complete
            current_state: ReviewArtifact and BuildArtifact both recover typed metadata. Full content still loads via storage lookups.
            missing: No shared cross-domain artifact query layer.

      - id: T1-E3
        name: Workspace And Execution Discipline
        status: in_progress
        approx_progress: 60
        remaining_gap: Builder is workspace-first and reviewer is explicitly READ_ONLY_HOST; shared cross-domain workspace linkage is still partial.
        stories:
          - id: T1-E3-S1
            name: Ensure all mutable engineering work happens in isolated workspaces
            status: in_progress
            current_state: Builder requires a workspace manager, defaults to WORKSPACE_BOUND, and now syncs repos into managed workspaces before verification.
            missing: Reviewer v1 is still read-only and there is no shared mutable execution model yet.
          - id: T1-E3-S2
            name: Make workspace lifecycle, audit, and recovery robust
            status: mostly_complete
          - id: T1-E3-S3
            name: Link workspace records to jobs, artifacts, and approvals
            status: started
            current_state: BuildJob carries workspace_id and workspace lifecycle links to job execution.
            missing: No shared workspace, artifact, and approval cross-linkage.
          - id: T1-E3-S4
            name: Add environment profiles for safe execution modes
            status: started
          - id: T1-E3-S5
            name: Bind reviewer jobs to workspace discipline or define explicit read-only review execution mode
            status: complete_for_phase
            current_state: ExecutionMode always READ_ONLY_HOST in v1. _get_analysis_path() is single source of truth.
            missing: WORKSPACE_BOUND requires analyzers to read from workspace path (v2 scope).

  - id: T2
