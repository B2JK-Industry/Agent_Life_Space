name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          # sentence-transformers skipped in CI — model download too slow
          # semantic_router tests are skipped when not installed

      - name: Lint (auto-fix imports, then check)
        run: |
          ruff check agent/ tests/ --fix --select I
          ruff check agent/ tests/

      - name: Type check (mypy — core modules)
        run: |
          mypy agent/core/tool_policy.py agent/core/persona.py agent/core/models.py \
               agent/core/action.py agent/core/approval.py agent/core/status.py \
               agent/core/explanation.py agent/core/operator.py \
               agent/memory/store.py agent/finance/budget_policy.py \
               --ignore-missing-imports --no-error-summary

      - name: Run tests
        timeout-minutes: 3
        run: |
          timeout 120 pytest tests/ -q --tb=short -W error::DeprecationWarning || {
            EXIT=$?
            if [ "$EXIT" -eq 124 ]; then
              echo "WARN: pytest hung after completion — killed by timeout"
              exit 0
            fi
            exit $EXIT
          }

      - name: Security audit
        run: pytest tests/test_security_audit.py -v --tb=short

      - name: Review eval smoke
        run: pytest tests/test_review_eval_smoke.py -q --tb=short

      - name: Performance budget
        timeout-minutes: 3
        run: |
          # Single run: capture output, check time + count
          # timeout 90s because pytest hangs ~40s after completion (asyncio cleanup)
          OUTPUT=$(timeout 90 pytest tests/ -q --tb=no 2>&1) || {
            EXIT=$?
            if [ "$EXIT" -eq 124 ]; then
              echo "WARN: pytest hung after completion — killed by timeout"
            else
              echo "$OUTPUT" && exit $EXIT
            fi
          }
          echo "$OUTPUT" | tail -3
          # Verify tests actually completed (not just timeout)
          if echo "$OUTPUT" | grep -q "passed"; then
            TEST_COUNT=$(echo "$OUTPUT" | grep -oP '\d+ passed' | grep -oP '\d+')
            echo "Test count: $TEST_COUNT"
            if [ "$TEST_COUNT" -lt 1000 ]; then
              echo "FAIL: Test count below 1000 (got $TEST_COUNT)" && exit 1
            fi
          else
            echo "FAIL: Tests did not complete" && exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: TypeScript typecheck (operator contracts)
        run: |
          cd operator && npm ci && npm run typecheck

      - name: Architecture invariants
        run: |
          # No duplicate persona definitions — prompts must come from persona.py
          ! grep -rn "Som John\. Autonómna bytosť" agent/ --include="*.py" | grep -v persona.py | grep -v "# noqa"
          # No hardcoded ~/agent-life-space paths
          ! grep -rn "~/agent-life-space" agent/ --include="*.py"
          # Path.home() / "agent-life-space" only allowed in paths.py (centralized resolver)
          ! grep -rn 'Path.home().*agent-life-space' agent/ --include="*.py" | grep -v paths.py
          # AGENT_SANDBOX_ONLY default must be "1" (safe)
          grep -q 'AGENT_SANDBOX_ONLY.*"1"' agent/core/llm_provider.py
